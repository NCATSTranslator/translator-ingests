# This file is a partial RIG file for Panther, relative to additional input data plus
# nodes and edges more specifically generated by the Automat/ORION ingestion framework,
# in addition to the ones generated in the initial Panther ingest script, based on Monarch.

ingest_info:
  relevant_files:
  - file_name: "PTHR<Panther-version>_<taxon_name>"
    location: "https://data.pantherdb.org/ftp/sequence_classifications/current_release/PANTHER_Sequence_Classification_files/"
    description: "Panther sequence classifications in reference genomes"
  included_content:
  - file_name: "PTHR<Panther-version>_<taxon_name>"
    included_records: "All records for the specified taxon."
    fields_used: >-
      Gene Identifier,Protein ID,PANTHER SF ID,PANTHER Family Name,PANTHER Subfamily Name,
      PANTHER Molecular function,PANTHER Biological process,Cellular components,Protein class,Pathway
  filtered_content:
  - file_name: "PTHR<Panther-version>_<taxon_name>"
    filtered_records: "All records with Gene and Ortholog pairwise annotated with taxon name as 'HUMAN', 'MOUSE' or 'RAT' specific."
    rationale: >-
      As per the Panther ortholog data, this ingest restricts the ingest of
      sequence annotation data to only human, mouse and rat reference genomes.
target_info:
  #automat-panther: Gene Family--located in->Cellular Component
  - subject_categories:
    - "biolink:GeneFamily"
    predicates:
      - "biolink:located_in"
    object_categories:
    - "biolink:CellularComponent"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther Gene family cellular location of expression"
  #automat-panther: Gene Family--actively involved in->Biological Process
  - subject_categories:
    - "biolink:GeneFamily"
    predicates:
      - "biolink:actively_involved_in"
    object_categories:
    - "biolink:BiologicalProcess"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther Gene Family involvement in a biological process"
  #automat-panther: Gene Family--catalyzes->Molecular Activity
  - subject_categories:
    - "biolink:GeneFamily"
    predicates:
      - "biolink:catalyzes"
    object_categories:
    - "biolink:MolecularActivity"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther Gene Family catalysis of a molecular activity"
  #automat-panther: Gene Family--actively involved in->Pathway
  - subject_categories:
    - "biolink:GeneFamily"
    predicates:
      - "biolink:actively_involved_in"
    object_categories:
    - "biolink:Pathway"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther active involvement of a Gene Family in a pathway"
  #automat-panther: Pathway--has participant->Gene Family
  - subject_categories:
    - "biolink:Pathway"
    predicates:
      - "biolink:has_participant"
    object_categories:
    - "biolink:GeneFamily"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther participation of a Gene Family in a pathway"
  #automat-panther: Pathway--subclass of->Biological Process
  - subject_categories:
    - "biolink:Pathway"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:BiologicalProcess"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther pathway as a subclass of a biological process"
  #automat-panther: Pathway--subclass of->Pathway
  - subject_categories:
    - "biolink:Pathway"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:Pathway"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther pathway as a subclass of another pathway"
  #automat-panther: Molecular Activity--subclass of->Molecular Activity
  - subject_categories:
    - "biolink:MolecularActivity"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:MolecularActivity"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther molecular activity as a subclass of another molecular activity"
  #automat-panther: Biological Process--subclass of->Biological Process
  - subject_categories:
    - "biolink:BiologicalProcess"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:BiologicalProcess"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther biological process as a subclass of another biological process"
  #automat-panther: Cellular Component--subclass of->Cellular Component
  - subject_categories:
    - "biolink:CellularComponent"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:CellularComponent"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther cellular component as a subclass of another cellular component"
  #automat-panther: Cellular Component--subclass of->Anatomical Entity
  - subject_categories:
    - "biolink:CellularComponent"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:AnatomicalEntity"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther cellular component as a subclass of anatomical entity"
  #automat-panther: Cellular Component--subclass of->Gross Anatomical Structure
  - subject_categories:
    - "biolink:CellularComponent"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:GrossAnatomicalStructure"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther cellular component as a subclass of gross anatomical structure"
  #automat-panther: Anatomical Entity--subclass of->Cellular Component
  - subject_categories:
    - "biolink:AnatomicalEntity"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:CellularComponent"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther anatomical entity as a subclass of cellular component"
  #automat-panther: Gross Anatomical Structure--subclass of->Cellular Component
  - subject_categories:
    - "biolink:GrossAnatomicalStructure"
    predicates:
      - "biolink:subclass_of"
    object_categories:
    - "biolink:CellularComponent"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    ui_explanation: "Panther gross anatomical structure as a subclass of cellular component"
node_type_info:
  - node_category: "biolink:Pathway"
    source_identifier_types:
      - PANTHER.PATHWAY
    node_properties:
      - "biolink:name"
      - "biolink:same_as"
      - "dct:description"
      - "information_content"
  - node_category: "biolink:MolecularActivity"
    source_identifier_types:
      - GO
    node_properties:
      - "biolink:name"
      - "biolink:same_as"
      - "dct:description"
      - "information_content"
  - node_category: "biolink:BiologicalProcess"
    source_identifier_types:
      - GO
    node_properties:
      - "biolink:name"
      - "biolink:same_as"
      - "dct:description"
      - "information_content"
  - node_category: "biolink:CellularComponent"
    source_identifier_types:
      - GO
    node_properties:
      - "biolink:name"
      - "biolink:same_as"
      - "dct:description"
      - "information_content"
  - node_category: "biolink:AnatomicalEntity"
    source_identifier_types:
      - UBERON
      - UMLS
    node_properties:
      - "biolink:name"
      - "biolink:same_as"
      - "dct:description"
  - node_category: "biolink:GrossAnatomicalStructure"
    source_identifier_types:
      - UBERON
    node_properties:
      - "biolink:name"
      - "biolink:same_as"
      - "dct:description"
      - "biolink:Attribute"
    additional_notes: "biolink:Attribute is used to capture the information content"
