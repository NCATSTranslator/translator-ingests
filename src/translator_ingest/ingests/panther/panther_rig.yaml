name: Panther Gene Orthology Reference Ingest Guide
source_info:
  infores_id: infores:panther
  name: Panther Gene to Gene Orthology Relationships
  description: >-
    PANTHER (Protein ANalysis THrough Evolutionary Relationships) is developed and maintained
    by researchers at the University of Southern California in collaboration with
    the Gene Ontology Consortium and other partners. The core of PANTHER is a comprehensive,
    annotated library of gene family phylogenetic trees providing protein family and
    subfamily classifications, ortholog relationships, Gene Ontology annotations,
    biological pathways, protein class assignments, and evolutionary histories for genes
    across numerous species.  The goal of Panther is to facilitate high-throughput analysis
    for comparative genomics, functional classification, evolutionary analysis,
    gene set enrichment, and interpretation of high-throughput genomic experiments.
    Knowledge is generated through computational phylogenetic analyses that classify
    proteins into evolutionary families, inference of orthology and gene function
    from evolutionary relationships, integration of Gene Ontology annotations and
    other external biological resources, and expert manual curation of selected
    protein families, evolutionary events, and biological pathways. All nodes in the tree
    have persistent identifiers that are maintained between versions of PANTHER, providing a
    stable substrate for annotations of protein properties like subfamily and function.
  citations:
    - https://doi.org/10.1002/pro.4218
  terms_of_use_info:
    terms_of_use_url: "http://www.pantherdb.org/tou.jsp"
    license_info: >-
      The PANTHER Hidden Markov Models (including names, descriptions and abstracts) that
      are distributed with the InterproScan software package may be copied and redistributed
      freely in accordance with the Interpro Copyright agreement.
      
      PANTHER data and data products: CC Attribution 4.0 International License.
      
      PANTHER software and tools: under their own licenses as specified in the software.
      
      Intellectual Property Rights: Except for the limited nonexclusive right granted 
      to access and use certain software, data, information and downloads as expressly
      provided herein, Paul Thomas retains all right, title and interest in and to all software,
      data, information and downloads made available herein, and any intellectual property rights
      therein or thereto. Except as expressly provided herein, no right, license, immunity,
      or other defense shall be implied by or inferred from this Agreement or the activities
      of the parties in connection herewith.
    license_url: "https://creativecommons.org/licenses/by/4.0/legalcode, https://interpro-documentation.readthedocs.io/en/latest/interproscan.html"
  data_access_locations:
    - "http://data.pantherdb.org/ftp/"
  data_provision_mechanisms:
    - file_download
  data_formats:
    - csv
  data_versioning_and_releases: "Versioning by number. See https://www.pantherdb.org/data/"
  source_status: unknown  # seems quiescent now: the last major update was in 2024
ingest_info:
  ingest_categories:
    - primary_knowledge_provider
  utility: >-
    Homology relationships and association of GO and related annotation
    by orthology inference can be made in between human genes and 
    non-human species like mouse, rat and many model species, based on
    the phenotypic characteristics of genes transitively inferred from
    experimental observations in the model species which cannot
    generally be easily or ethically replicated upon human beings.
  scope: "Gene to gene genomic orthology relationships and associated annotations"
  relevant_files:
  - file_name: "RefGenomeOrthologs.tar.gz"
    location: "http://data.pantherdb.org/ftp/ortholog/current_release/"
    description: "Gene to Gene Orthology Relationships in reference genomes"
  - file_name: "PTHR<Panther-version>_<taxon_name>"
    location: "http://data.pantherdb.org/ftp/sequence_classifications/current_release/PANTHER_Sequence_Classification_files/"
    description: "Gene sequence annotation from specific genomes"
  included_content:
  - file_name: "RefGenomeOrthologs.tar.gz"
    included_records: "All records, with taxonomic filtering noted below."
    fields_used: "Gene, Ortholog, Type of ortholog, Panther Ortholog ID"
  - file_name: "PTHR<Panther-version>_<taxon_name>"
    included_records: "All records for the specified taxon."
    fields_used: "Gene, Ortholog, Type of ortholog, Panther Ortholog ID"
  filtered_content:
  - file_name: "RefGenomeOrthologs.tar.gz, PTHR<Panther-version>_<taxon_name>"
    filtered_records: >-
      All records with Gene and Ortholog pairwise annotated with taxon name as 'HUMAN', 'MOUSE' or 'RAT' specific.
    rationale: >-
      Panther contains a huge number of records covering orthologs across 144 diverse species
      (as of September 2025), but our core interest in Translator focuses on genes in taxa close
      in evolutionary terms to human, thus having significant genetic, molecular and physiological 
      annotation closer to human biology in character. It is also expected that the genes of these
      evolutionarily close species also already have a significant assignment of functional roles 
      partially inferred from other model organisms (e.g. developmental gene functions mapped 
      from fruit fly or nematode onto mouse genes, but also experimentally tested in mouse).
      The character of genetic and physiological systems are much more similar between humans and 
      mice or rats, in particular, studied responses in pharmacology, metabolism, and the immune system.
  future_considerations:
  - category: other
    consideration: Additional model species may be included in the future.
  - category: edge_property_content
    consideration: >-
      Are there any useful edge properties / EPC metrics that could be collected
      on orthology edges (e.g. data items output from the sequence alignment /
      phylogenetic analysis) that could be used to score these edges?
      Notes: this would require meta-analysis of the Panther HMM classification files
      (at https://data.pantherdb.org/ftp/hmm_classifications/current_release) and/or sequence
      classification files (at https://data.pantherdb.org/ftp/sequence_classifications/current_release).
  - category: node_property_content
    consideration: >-
      Family node properties we might capture: HMM length, member count, others?
      Note: HMM data annotation would require meta-analysis of the Panther HMM library data
      at https://data.pantherdb.org/ftp/panther_library/current_release/
target_info:
  edge_type_info:
  - subject_categories:
    - "biolink:Gene"
    predicates:
      - "biolink:orthologous_to"
    object_categories:
    - "biolink:Gene"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - manual_validation_of_automated_agent
    primary_knowledge_sources:
    - infores:panther
    edge_properties:
    - has_evidence
    ui_explanation: >-
      Panther gene orthology. To determine when two genes are orthologous, Panther uses advanced automated algorithms
      that rely only on sequence similarity, evolutionary tree topology, and evolutionary event labeling.
      Curators will manually review the data underlying orthology calls to improve accuracy.
    source_files:
    - RefGenomeOrthologs.tar.gz
  - subject_categories:
    - "biolink:Gene"
    predicates:
      - "biolink:member_of"
    object_categories:
    - "biolink:GeneFamily"
    knowledge_level:
    - knowledge_assertion
    agent_type:
    - automated_agent
    primary_knowledge_sources:
      - infores:panther
    ui_explanation: >-
      Gene membership in Panther orthology family.  Panther defines protein families using a
      statistical Hidden Markov Model (HMM) that represents its sequence signature.
      Individual protein sequences are compared to and scored against these signatures,
      with those passing a membership threshold being assigned to a family.
    source_files:
    - RefGenomeOrthologs.tar.gz
  node_type_info:
  - node_category: "biolink:Gene"
    source_identifier_types:
    - HGNC
    - MGI
    - RGD
    - ENSEMBL
    node_properties:
    - "biolink:in_taxon"
  - node_category: "biolink:GeneFamily"
    source_identifier_types:
      - PANTHER.FAMILY
  future_considerations:
  - category: other
    consideration: >-
      The Monarch Initiative ingest of Panther data (https://github.com/monarch-initiative/pantherdb-orthologs-ingest)
      sometimes attempts to map eccentric identifiers into the NCBI gene identifier space. The initial iteration of 
      the Panther ingest in Translator does not attempt to do this at this time, but rather simply uses the given id.
