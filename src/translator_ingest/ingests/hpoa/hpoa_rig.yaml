name: Human Phenotype Ontology Annotations Reference Ingest Guide
source_info:
  infores_id: infores:hpo-annotations
  name: Human Phenotype Ontology Annotations
  description: >-
    The [Human Phenotype Ontology (HPO)](https://hpo.jax.org/) annotation dataset is
    produced and maintained by the Human Phenotype Ontology Consortium, led by investigators
    at the Charité – Universitätsmedizin Berlin and collaborating institutions.
    Its purpose is to provide standardized annotations linking human diseases and 
    genes to phenotypic abnormalities using Human Phenotype Ontology terms, 
    thereby supporting rare disease diagnosis, genomic variant interpretation, 
    disease gene discovery, and computational phenotype analysis.
    
    The dataset contains disease–phenotype annotations, gene–phenotype associations,
    phenotype frequencies, onset information, modifiers, evidence metadata,
    and supporting references. Knowledge is generated through expert manual curation
    of the biomedical literature, clinical case reports, and authoritative disease resources,
    together with integration of annotations from external databases such as rare disease
    and clinical genetics resources. Additional computational pipelines harmonize annotations
    to ontology terms and propagate annotations through the ontology hierarchy
    while preserving provenance and evidence for each association.
    
    Here we create Biolink associations between genes, phenotypic features and diseases,
    together with their evidence, and age of onset and frequency (if known). Disease annotations here
    are also cross-referenced to the [MONarch Disease Ontology (MONDO)](https://mondo.monarchinitiative.org/).
    There are three HPOA ingests: 'disease-to-phenotype' (nodes including disease modes of inheritance
    when given, plus edges), 'gene-to-phenotype' and 'gene-to-disease'.
  citations:
  - https://doi.org/10.1093/nar/gkaa1043
  terms_of_use_info:
    terms_of_use_url: "https://hpo.jax.org/license"
    terms_of_use_description: >-
      Freely available for use and redistribution with attribution, 
      version/date disclosure, and no content modification.
      Human Phenotype Ontology (HPO) used herein is copyrighted.
  data_access_locations:
  - https://hpo.jax.org/data/annotations
  data_provision_mechanisms:
  - file_download
  - api_endpoint
  data_formats:
  - tsv
  - other  # phenotype.hpoa is actually a tsv with a multi-line comment header
  data_versioning_and_releases: >-
     GitHub managed releases at https://github.com/obophenotype/human-phenotype-ontology/releases
     HPO is released +/- 5 times each year. Versioning is based on the month and year of the release.
  source_status: maintained_regular_updates
ingest_info:
  ingest_categories:
  - primary_knowledge_provider
  utility: >-
    The Human Phenotype Ontology was initially developed at the Charité University Hospital
    in Berlin, Germany by Peter N Robinson and Sebastian Köhler with support from
    Sandra Doelken and Sebastian Bauer. Very soon after the initial publication of the HPO in 2008,
    a collaboration was initiated with researchers from the Lawrence Berkeley National Laboratory
    (Chris Mungall, Suzi Lewis, and Nicole Washington), the University of Cambridge
    (Michael Ashburner Paul Schofield, George Gkoutos), and the University of Oregon
    (Melissa Haendel, Monte Westerfield). These groups have developed a scheme for
    Linking human diseases to animal models using ontology-based phenotype annotation.
    In parallel, the DECIPHER project at the Wellcome Trust Sanger Institute led by
    Helen Firth and Matt Hurles, conducted clinical workshops to extend the HPO
    and have provided an enormous amount of support and input in subsequent years.
    Knowledge asserted by HPO phenotype/disease/gene annotation aligns well with research
    questions for target users of the Biomedical Data Translator.
  scope:
    Covers curated Disease, Phenotype and Genes relationships annotated with
    Human Phenotype Ontology terms.
  relevant_files:
  - file_name: phenotype.hpoa
    location: https://hpo.jax.org/data/annotations
    description: disease to HPO phenotype annotations, including inheritance information
  - file_name: genes_to_disease.txt
    location: https://hpo.jax.org/data/annotations
    description: gene to HPO disease annotations
  - file_name: genes_to_phenotype.txt
    location: https://hpo.jax.org/data/annotations
    description: gene to HPO phenotype annotations
  included_content:
  - file_name: phenotype.hpoa
    included_records: Disease to Phenotype relationships (i.e., rows with 'aspect' == 'P')
    fields_used: database_id, qualifier, hpo_id, reference, evidence, onset, frequency, sex, aspect
  - file_name: phenotype.hpoa
    included_records:
      Disease "Mode of Inheritance" relationships (i.e., rows with 'aspect' == 'I')
      represented as node properties rather than edges
    fields_used: database_id, qualifier, hpo_id, reference, evidence, onset, frequency, sex, aspect
  - file_name: genes_to_disease.txt
    included_records: Mendelian Gene to Disease relationships (i.e., rows with 'association_type' == 'MENDELIAN')
    fields_used: ncbi_gene_id, gene_symbol, association_type, disease_id, source
  - file_name: genes_to_disease.txt
    included_records: Polygenic Gene to Disease relationships (i.e., rows with 'association_type' == 'POLYGENIC')
    fields_used: ncbi_gene_id, gene_symbol, association_type, disease_id, source
  - file_name: genes_to_phenotype.txt
    included_records: >-
      Records where we determine that the reported G-P association was
      inferred over a G-D associated type with the value "MENDELIAN"
    fields_used: ncbi_gene_id, gene_symbol, hpo_id, hpo_name, frequency, disease_id
  filtered_content:
    - file_name: genes_to_disease.txt
      filtered_records: >-
        Records where we determine that the reported G-P association was inferred
        over a G-D associated type with the value "UNKNOWN"
      rationale: >-
        Records of this type are not included in the ingest because they are Gene-Disease
        relationships for which the supporting evidence is missing, weak or inconclusive.
    - file_name: genes_to_phenotype.txt
      filtered_records: >-
        Records where we determine that the reported G-P association was inferred
        over a G-D associated type with the value "POLYGENIC" or "UNKNOWN"
      rationale: >-
        HPO will infer a Gene-Phenotype association G1-P1 in cases where G1 causes,
        contributes_to, or is associated with D1, and D1 is associated with a Phenotype P1.
        This logic holds for Mendelian disease where a single gene is causal and thus
        responsible for all associated phenotypes. It does not necessarily hold for 
        Polygenic or Unknown diseases where the gene may be one of many contributing
        factors, and thus does not necessarily contribute to or have an association
        with each phenotype of the disease.
  future_considerations:
  - category: edge_content
    consideration: >-
      Consider bringing back G-P associations based on inferences over
      Unknown Diseases if we establish a confidence annotation paradigm
      that lets us indicate these inferences to be weaker than those
      inferred over Mendelian or Polygenic diseases where the Gene is
      individually causal for, or contributing to, the disease.
    relevant_files: genes_to_disease.txt
  - category: edge_content
    consideration: >-
      Consider bringing back G-P associations based on inferences over
      Polygenic or Unknown Diseases if we establish a confidence annotation paradigm 
      that lets us indicate these inferences to be weaker than those inferred over
      Mendelian diseases where the Gene is individually causal for the disease
      and all of its phenotypes.
    relevant_files: genes_to_phenotype.txt
target_info:
  edge_type_info:
    - subject_categories:
        - "biolink:Disease"
      predicates:
        - "biolink:has_phenotype"
      object_categories:
        - "biolink:PhenotypicFeature"
      qualifiers:
        - property: "biolink:onset_qualifier"
          value_id_prefixes:
            - "HP"
          value_description: "A term from the 'Onset' (HP:0003674) branch of the Human Phenotype Ontology"
        - property: "biolink:frequency_qualifier"
          value_id_prefixes:
            - "HP"
          value_description: "A term from the 'Frequency' (HP:0040279) branch of the Human Phenotype Ontology"
        - property: "biolink:sex_qualifier"
          value_id_prefixes:
            - "PATO"
          value_description: "A term from the 'biological sex' (PATO:0000047) branch of the PATO Ontology"
      knowledge_level:
      - knowledge_assertion
      agent_type:
        # see https://obophenotype.github.io/human-phenotype-ontology/annotations/creation/
        - text_mining_agent
        - manual_agent
        - manual_validation_of_automated_agent
      primary_knowledge_sources:
        - infores:hpo-annotations
      edge_properties:
        - "biolink:negated"
        - "biolink:publications"
        - "biolink:has_evidence_of_type"
        - "biolink:has_count"
        - "biolink:has_total"
        - "biolink:has_percentage"
        - "biolink:has_quotient"
      ui_explanation: >-
        Source HPOA data provide Disease-Phenotype associations that are produced by
        HPO curators through manual review of clinical data and published evidence.
        The HPOA record used to create this Translator edge reports that a Phenotype
        is observed to manifest in a particular Disease, and may include information about
        the frequency and/or biological context (e.g. sex, onset, frequency) of this manifestation.
        This relationship is represented using the Biolink 'has phenotype' predicate -
        with optional qualifiers describing frequency/context information where provided,
        as well as, the 'negated' property to indicate that the Phenotype is not observed.
      source_files:
        - phenotype.hpoa
    - subject_categories:
      - "biolink:Gene"
      predicates:
        - "biolink:associated_with"
      object_categories:
      - "biolink:Disease"
      qualifiers:
        - property: "biolink:qualified_predicate"
          value_enumeration: 
            - "biolink:causes" 
            - "biolink:contributes_to"
          value_description: >-
            The qualified predicate is selected on the basis of whether the 'association_type'
            reported by HPOA is 'MENDELIAN' or 'POLYGENIC'. For Mendelian disorders (where the
            "association_type" field = 'MENDELIAN') direct causation is assumed hence the
            qualified_predicate is 'causes'). For polygenic disorders, the qualified predicate
            is rather set to 'contributes_to' since the subject gene of the relationship
            may only be one of a set of genes contributing to the phenotype.
        - property: "biolink:subject_form_or_variant_qualifier"
          value_range:
          - "biolink:ChemicalOrGeneOrGeneProductFormOrVariantEnum"
          value_description: >-
            Specifically, the 'genetic_variant_form' enum value is used in all cases of this ingest.
      knowledge_level:
      - knowledge_assertion
      agent_type:
      - manual_agent
      primary_knowledge_sources:
        - infores:hpo-annotations      
      edge_properties: null
      ui_explanation: >-
        Source HPOA data provide Gene-Disease associations that are manually curated from
        sources like Orphanet and MIM2Gene and DECIPHER by HPO. The record used to create
        this Translator edge reports that a Gene is associated with a Disease when there
        is evidence that variants in the gene may cause or contribute to its manifestation.
        The Biolink predicate used to represent this relationship depends on the type of 
        Disease. The qualified predicate is selected on the basis of whether the 'association_type'
        reported by HPOA is 'MENDELIAN' or 'POLYGENIC'. For Mendelian disorders (where the
        "association_type" field = 'MENDELIAN') direct causation is assumed hence the
        qualified_predicate is 'causes'). For polygenic disorders, the qualified predicate
        is rather set to 'contributes_to' since the subject gene of the relationship
        may only be one of a set of genes contributing to the phenotype.
        Qualifier is used to indicate that it is a 'genetic_variant_form'
        of the gene that participates in these relationships, not the Gene in general.
      source_files:
        - genes_to_disease.txt
    - subject_categories:
      - "biolink:Gene"
      predicates:
        - "biolink:has_phenotype"
      object_categories:
      - "biolink:PhenotypicFeature"
      qualifiers:
        - property: "biolink:qualified_predicate"
          value_enumeration: 
            - "biolink:causes"
        - property: "biolink:subject_form_or_variant_qualifier"
          value_range:
            - "biolink:ChemicalOrGeneOrGeneProductFormOrVariantEnum"
          value_description: >-
            Specifically, the 'genetic_variant_form' enum value is used in all cases of this ingest.
        - property: "biolink:disease_context_qualifier"
          value_id_prefixes:
            - "MONDO"
          value_description: "A term from the 'Disease' (MONDO:0000001) branch of the MONDO Ontology"
        - property: "biolink:frequency_qualifier"
          value_id_prefixes:
            - "HP"
          value_description: >-
            A term from the 'Frequency' (HP:0040279) branch of the Human Phenotype Ontology,
            inferred from the 'frequency' field of the HPOA record used to create this edge.
      knowledge_level:
      - logical_entailment
      agent_type:
        # Inferred from 'evidence' code inherited from the HPOA phenotype.hpoa file
        # see https://obophenotype.github.io/human-phenotype-ontology/annotations/creation/
        - text_mining_agent
        - manual_agent
        - manual_validation_of_automated_agent
      primary_knowledge_sources:
        - infores:hpo-annotations        
      edge_properties:
        - "biolink:publications"
        - "biolink:has_evidence_of_type"
        - "biolink:has_count"
        - "biolink:has_total"
        - "biolink:has_percentage"
        - "biolink:has_quotient"
      ui_explanation: >-
        A left outer join of HPOA phenotype, gene-to-disease and gene-to-phenotype data
        provides for the assignment of Gene-Phenotype associations that are manifested
        in a Disease associated with a particular Gene.
        
        The record used to create this edge specifically reports a Gene-Phenotype association
        where the Gene has variants causal for a Mendelian disorder in which the Phenotype
        is manifested - from which it is logically entailed that variants in the Gene are
        also causal for the Phenotype (as such disorders have a single causal gene).
        
        Given the uncertainties of directly mapping genes onto phenotypic features for either
        polygenic or diseases of unknown genetic etiology, this edge type is only generated for
        Mendelian disorders. The Mendelian causality of the relationship is therefore represented
        using the Biolink 'causes' predicate.
        
        Use of the qualifier 'genetic_variant_form' indicates that it is a variant of the gene that is
        causing the Phenotype (not necessarily other variants, including wild type variants of the Gene).
        
        Agent type of the relationship is inherited from the HPOA phenotype.hpoa file.
      source_files:
        - phenotype.hpoa
        - genes_to_disease.txt
        - genes_to_phenotype.txt
  node_type_info:
  - node_category: "biolink:Disease"
    source_identifier_types:
      - "OMIM"
      - "ORPHANET"
      - "DECIPHER"
    node_properties:
    - "biolink:inheritance"
  - node_category: "biolink:PhenotypicFeature"
    source_identifier_types:
      - "HP"
  - node_category: "biolink:Gene"
    source_identifier_types:
      - "NCBIGene"
  future_considerations:
    - category: spoq_pattern
      consideration: >-
        Consider alternate patterns for representing G-causes-D and G-contributes_to-D associations
        where we place more semantics into predicates, per 
        https://github.com/NCATSTranslator/Data-Ingest-Coordination-Working-Group/issues/22
        Should we consider creating support paths in our data/graphs, 
        for the G-D-P hops over which HPO infers G-P associations?
        (e.g. `GENE1 -causes-> DISEASE1 -has_phenotype-> PHENO1 ---->  GENE1 -causes-> PHENO1`)
  additional_notes: >-
    The HPOA ingest of the Disease.node_properties.inheritance value is currently thought to be mildly
    unreliable due to the way node property merging is (not) currently implemented in the ingest. This is a
    known issue (Translator Ingest PR https://github.com/NCATSTranslator/translator-ingests/issues/259)
    which will be addressed in a future release of the pipeline and/or ingest.
