  - category: edge_content
    consideration:  >-
      Diseases lacking OMIM identifiers are not included in the ingest,
      but do have other identifying information, like their human readable
      names.  Perhaps these name strings can be used to look up MONDO 
      identifiers which can be used in place of the OMIM identifiers?
    relevant_files: hmdb_metabolites.xml
