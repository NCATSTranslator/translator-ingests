name: "ICEES Reference Ingest Guide"
source_info:
  infores_id: infores:icees-kg
  name: Integrated Clinical and Environmental Exposures Service (ICEES)
  description: >-
    The Integrated Clinical and Environmental Exposures Service (ICEES) is developed
    primarily by the Renaissance Computing Institute at the University of North Carolina
    at Chapel Hill as part of the NCATS Biomedical Data Translator. Its goal is to enable
    secure exploration of relationships between clinical characteristics and environmental
    exposures while protecting patient privacy, supporting cohort discovery, hypothesis
    generation, and translational biomedical research. ICEES provides access regulatory-compliant
    open access integrated, de-identified clinical (e.g., electronic health records, survey data,
    clinical research data) and environmental exposure (e.g., airborne pollutants, landfills,
    concentrated animal feeding operations, socio-economic indicators) data through aggregated
    feature tables and statistical association services rather than individual patient records.
    The knowledge is generated by integrating electronic health record data with environmental
    exposure datasets using standardized data models and privacy-preserving aggregation methods.
    Automated computational pipelines harmonize clinical variables, geospatial exposure
    measurements, and temporal information, enabling statistical analyses while ensuring
    that protected health information is not exposed.
  citations: null
  terms_of_use_info:
    terms_of_use_url: "https://github.com/NCATSTranslator/Translator-All/wiki/Exposures-Provider-ICEES-and-ICEES-KG-Terms-and-Conditions-of-Use"
    terms_of_use_description: "UNC Health is permitted to provide under 45 C.F.R.\
      \ \xC2\xA7 164.502(d)(2)"
  data_access_locations:
    - 'https://stars.renci.org/var/plater/bl-4.2.1/icees-kg/8-20-2024/ - Automat ICEES
    Plater loaded KGX jsonl files, plus meta_knowledge_graph.json'
  data_provision_mechanisms:
    - file_download
  data_formats:
    - kgx
  data_versioning_and_releases: Static dataset released 8-20-2024
ingest_info:
  ingest_categories:
    - aggregation_interpreter
  utility: >-
    The impact of environmental exposures on clinical status is well known. This knowledge resource
    aggregates such data from significant institutional expertise within Translator.
  scope: Clinical correlations to environmental exposures.
  relevant_files:
  - file_name: nodes.jsonl.gz
    location: https://stars.renci.org/var/plater/bl-4.2.1/icees-kg/8-20-2024
    description: KGX jsonl file of KGX 'nodes' data from Phase 2 ICEES clinical knowledge provider activities.
  - file_name: edges.jsonl.gz
    location: https://stars.renci.org/var/plater/bl-4.2.1/icees-kg/8-20-2024
    description: KGX jsonl file of KGX 'edges' data from Phase 2 ICEES clinical knowledge provider activities.
  included_content:
  - file_name: nodes.jsonl
    included_records: all
    fields_used: id, name, category, equivalent_identifiers
  - file_name: edges.jsonl
    included_records: all
    fields_used: id, subject, predicate, object, primary_knowledge_source, attributes
