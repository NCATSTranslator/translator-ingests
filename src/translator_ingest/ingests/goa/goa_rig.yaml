# GO Annotations (GOA) Reference Ingest Guide (RIG)
name: GO Annotations (GOA) Reference Ingest Guide

# Information about the Source of the data ingest
source_info:
  infores_id: infores:goa
  name: GO Annotations (GOA)
  description: >-
    The Gene Ontology (GO) Annotations (GOA) dataset connects genes and gene products to Gene Ontology terms
    that describe a molecular function the gene product enables, a biological process in which it participates,
    or a cellular component in which it is active or located. Annotations are produced by members of the GO
    Consortium (including model organism databases, UniProt, and specialist curation groups). Most annotations
    are created through rigorous manual curation of the experimental literature, each supported by a GO evidence
    code and, where available, a publication reference. A large fraction of annotations are instead generated by
    automated pipelines that assign GO terms based on evidence such as sequence orthology, sequence similarity,
    phylogenetic inference, or InterPro-to-GO mappings (e.g. IEA, IBA). GOA is released as Gene Association Format
    (GAF 2.2) files, one per contributing group or organism, and is a foundational, broadly relevant source of
    gene function knowledge for Translator use cases.
  citations:
    - "Data Archive: https://zenodo.org/records/10536401"
    - "Publication: https://doi.org/10.1093/nar/gky1055"
  terms_of_use_info:
    terms_of_use_url: "https://geneontology.org/docs/go-citation-policy/"
    license_name: "CC BY 4.0"
    license_url: "https://creativecommons.org/licenses/by/4.0/legalcode#s3a1"
  data_access_locations:
    - "All downloads: https://geneontology.org/docs/download-go-annotations/"
    - "Commonly studied organisms: https://current.geneontology.org/products/pages/downloads.html"
    - "Per-file annotations directory (files actually ingested): https://current.geneontology.org/annotations/"
  data_provision_mechanisms:
    - file_download
  data_formats:
    - tsv
  data_versioning_and_releases: >-
    Release cadence: approximately every four weeks, synchronized with UniProtKB. Versioning: by release date -
    each GAF header includes a `!Generated: YYYY-MM-DD` line, and the ingest records the version from the
    `https://current.geneontology.org/metadata/release-date.json` metadata endpoint. Release notes:
    https://geneontology.org/docs/download-go-annotations/ and
    https://geneontology.org/docs/go-annotation-file-gaf-format-2.2/. Release archive:
    https://release.geneontology.org/. Format: tsv in GAF 2.2 (17 columns).
  source_status: maintained_regular_updates

# Information about Ingested Content (the scope, content, and rationale for what is included and excluded in this ingest)
ingest_info:
  ingest_categories:
    - primary_knowledge_provider
  utility: >-
    GOA is a rich source of manually curated (and computationally inferred) knowledge about gene function, with
    broad relevance to nearly all Translator queries and use cases involving genes, gene products, and the
    molecular functions, biological processes, and cellular components they are associated with.
  scope: >-
    This initial ingest of GOA covers molecular function (Aspect F), biological process (Aspect P), and cellular
    component (Aspect C) annotations for human, mouse, and rat genes and gene products, including both manually
    curated and electronically/computationally inferred content. Content is taken from GAF 2.2 files only
    (GPAD and GPI formats are not ingested). Records are restricted to NCBITaxon:9606 (human), NCBITaxon:10090
    (mouse), and NCBITaxon:10116 (rat) via a taxon filter on the Taxon column. Other species may be added in
    future iterations of the ingest.

  relevant_files:
    - file_name: "goa_human.gaf.gz"
      location: "https://current.geneontology.org/annotations/goa_human.gaf.gz"
      description: "Human gene-product to GO term associations (GAF 2.2), sourced primarily from UniProtKB."
    - file_name: "mgi.gaf.gz"
      location: "https://current.geneontology.org/annotations/mgi.gaf.gz"
      description: "Mouse gene-product to GO term associations (GAF 2.2), from Mouse Genome Informatics (MGI)."
    - file_name: "rgd.gaf.gz"
      location: "https://current.geneontology.org/annotations/rgd.gaf.gz"
      description: "Rat gene-product to GO term associations (GAF 2.2), from Rat Genome Database (RGD)."

  included_content:
    - file_name: "goa_human.gaf.gz"
      included_records: "All records for NCBITaxon:9606 (Taxon column filter). No evidence-code or aspect filtering is applied; negated (NOT) annotations are retained and represented explicitly."
      fields_used: "DB, DB_Object_ID, DB_Object_Symbol, Qualifier, GO_ID, DB_Reference, Evidence_Code, Aspect, DB_Object_Name, DB_Object_Type, Taxon, Assigned_By"
    - file_name: "mgi.gaf.gz"
      included_records: "All records for NCBITaxon:10090 (Taxon column filter). No evidence-code or aspect filtering is applied; negated (NOT) annotations are retained and represented explicitly."
      fields_used: "DB, DB_Object_ID, DB_Object_Symbol, Qualifier, GO_ID, DB_Reference, Evidence_Code, Aspect, DB_Object_Name, DB_Object_Type, Taxon, Assigned_By"
    - file_name: "rgd.gaf.gz"
      included_records: "All records for NCBITaxon:10116 (Taxon column filter). No evidence-code or aspect filtering is applied; negated (NOT) annotations are retained and represented explicitly."
      fields_used: "DB, DB_Object_ID, DB_Object_Symbol, Qualifier, GO_ID, DB_Reference, Evidence_Code, Aspect, DB_Object_Name, DB_Object_Type, Taxon, Assigned_By"

  filtered_content:
    - file_name: "goa_human.gaf.gz"
      filtered_records: "DB_Reference values that are not PMIDs (e.g. GO_REF, ISBN, Reactome, and other non-PMID references) are dropped from the publications edge property. Records whose DB source is not recognized in the DB-to-Biolink-class mapping are skipped entirely."
      rationale: "Only PMIDs are retained as publications for citation quality/consistency; records from unmapped source databases cannot be reliably typed to a Biolink subject category."
    - file_name: "mgi.gaf.gz"
      filtered_records: "Same as goa_human.gaf.gz: non-PMID DB_Reference values are excluded from the publications property, and records from unrecognized DB sources are skipped."
      rationale: "Only PMIDs are retained as publications; records from unmapped source databases cannot be reliably typed to a Biolink subject category."
    - file_name: "rgd.gaf.gz"
      filtered_records: "Same as goa_human.gaf.gz: non-PMID DB_Reference values are excluded from the publications property, and records from unrecognized DB sources are skipped."
      rationale: "Only PMIDs are retained as publications; records from unmapped source databases cannot be reliably typed to a Biolink subject category."

  future_considerations:
    - category: edge_content
      consideration: "Consider ingesting Gene/Product to GO Term annotations for taxa beyond human, mouse, and rat."
    - category: edge_property_content
      consideration: "Consider inclusion of qualifying/provenance information found in the Annotation Extension or With_Or_From columns. The With_Or_From column in particular can show provenance of inferred associations (e.g. the source of an IBA or IEA inference)."
    - category: edge_content
      consideration: "Consider ingesting associations between two GO Terms, per the Annotation Extension Relations specification at https://wiki.geneontology.org/index.php/Annotation_Relations#Standard_Annotation:_Annotation_Extension_Relations"
    - category: node_property_content
      consideration: "GOA generally adds curatorial value (id mapping, quality checking, and often more) when pulling annotations from sources like MODs, PANTHER, etc. This is why infores:goa is treated as the primary source; the upstream provider (from the Assigned_By field) is attributed as a supporting_data_source when it maps to a known infores (implemented for MGI, RGD, Reactome, IntAct, and GO-CAM/GO_Central/GOC)."
    - category: node_property_content
      consideration: "To be decided whether to bring in taxon info about gene/gene-product nodes from GOA, or rely on other gene property authorities for this information (e.g. ncbigene). Currently in_taxon is set on subject nodes from the GAF Taxon column."

# Information about the Graph Output by the ingest
target_info:
  infores_id: infores:translator-goa-kgx

  edge_type_info:
    - subject_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:MacromolecularComplex
        - biolink:RNAProduct
      predicates:
        - biolink:enables
      object_categories:
        - biolink:MolecularActivity
      knowledge_level:
        - knowledge_assertion
        - prediction
        - not_provided
      agent_type:
        - manual_agent
        - automated_agent
        - manual_validation_of_automated_agent
        - not_provided
      primary_knowledge_sources:
        - infores:goa
      supporting_data_sources:
        - infores:mgi
        - infores:rgd
        - infores:reactome
        - infores:intact
        - infores:go-cam
      edge_properties:
        - biolink:negated
        - biolink:has_evidence_of_type
        - biolink:publications
      ui_explanation: >-
        This edge asserts that a gene or gene product enables a molecular function (GO Aspect F). It was created
        from a GO annotation curated by a GO Consortium contributor from the experimental literature, or generated
        by an automated pipeline (e.g. electronic annotation). The GO evidence code on the source annotation
        determines the edge's knowledge level and agent type (e.g. an IDA/direct-assay annotation yields a
        manually-asserted edge, while an IEA/electronic annotation yields an automated prediction). GOA uses the
        'enables' relation when a gene product is solely capable of executing the reported activity, which is
        represented here with the Biolink 'enables' predicate.
      source_files:
        - goa_human.gaf.gz
        - mgi.gaf.gz
        - rgd.gaf.gz
      additional_notes:
        - "Knowledge level and agent type vary per edge based on the GO evidence code of the source annotation (see the EVIDENCE_CODE_TO_KNOWLEDGE_LEVEL_AND_AGENT_TYPE mapping in goa.py). The ECO code is captured on each edge via has_evidence_of_type."
        - "supporting_data_sources are populated per edge from the GAF Assigned_By field only when it maps to a known upstream provider; not every edge will carry one."

    - subject_categories:
        - biolink:MacromolecularComplex
      predicates:
        - biolink:contributes_to
      object_categories:
        - biolink:MolecularActivity
      knowledge_level:
        - knowledge_assertion
        - prediction
        - not_provided
      agent_type:
        - manual_agent
        - automated_agent
        - manual_validation_of_automated_agent
        - not_provided
      primary_knowledge_sources:
        - infores:goa
      supporting_data_sources:
        - infores:mgi
        - infores:rgd
        - infores:reactome
        - infores:intact
        - infores:go-cam
      edge_properties:
        - biolink:negated
        - biolink:has_evidence_of_type
        - biolink:publications
      ui_explanation: >-
        This edge asserts that a gene product contributes to a molecular function (GO Aspect F) as one required
        part of a larger macromolecular complex, rather than by executing the activity on its own. It was created
        from a GO annotation using the 'contributes_to' relation; the GO evidence code on the source annotation
        determines the edge's knowledge level and agent type. The relationship is represented here with the
        Biolink 'contributes_to' predicate.
      source_files:
        - goa_human.gaf.gz
        - mgi.gaf.gz
        - rgd.gaf.gz
      additional_notes:
        - "Knowledge level and agent type vary per edge based on the GO evidence code of the source annotation. The ECO code is captured on each edge via has_evidence_of_type."

    - subject_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:MacromolecularComplex
        - biolink:RNAProduct
      predicates:
        - biolink:involved_in
      object_categories:
        - biolink:BiologicalProcess
      knowledge_level:
        - knowledge_assertion
        - prediction
        - not_provided
      agent_type:
        - manual_agent
        - automated_agent
        - manual_validation_of_automated_agent
        - not_provided
      primary_knowledge_sources:
        - infores:goa
      supporting_data_sources:
        - infores:mgi
        - infores:rgd
        - infores:reactome
        - infores:intact
        - infores:go-cam
      edge_properties:
        - biolink:negated
        - biolink:has_evidence_of_type
        - biolink:publications
      ui_explanation: >-
        This edge asserts that a gene or gene product is involved in a biological process (GO Aspect P), i.e. its
        molecular function plays an integral role in that process. It was created from a GO annotation using the
        'involved_in' relation, or by aspect-based fallback when no qualifier is present. The GO evidence code on
        the source annotation determines the edge's knowledge level and agent type. The relationship is
        represented here with the Biolink 'involved_in' predicate.
      source_files:
        - goa_human.gaf.gz
        - mgi.gaf.gz
        - rgd.gaf.gz
      additional_notes:
        - "Knowledge level and agent type vary per edge based on the GO evidence code of the source annotation. The ECO code is captured on each edge via has_evidence_of_type."
        - "When the GAF Qualifier is absent or unrecognized, the predicate is assigned from the Aspect (P -> involved_in) via the ASPECT_TO_PREDICATE fallback in goa.py."

    - subject_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:MacromolecularComplex
        - biolink:RNAProduct
      predicates:
        - biolink:acts_upstream_of_or_within
        - biolink:acts_upstream_of_or_within_positive_effect
        - biolink:acts_upstream_of_or_within_negative_effect
        - biolink:acts_upstream_of
        - biolink:acts_upstream_of_positive_effect
        - biolink:acts_upstream_of_negative_effect
      object_categories:
        - biolink:BiologicalProcess
      knowledge_level:
        - knowledge_assertion
        - prediction
        - not_provided
      agent_type:
        - manual_agent
        - automated_agent
        - manual_validation_of_automated_agent
        - not_provided
      primary_knowledge_sources:
        - infores:goa
      supporting_data_sources:
        - infores:mgi
        - infores:rgd
        - infores:reactome
        - infores:intact
        - infores:go-cam
      edge_properties:
        - biolink:negated
        - biolink:has_evidence_of_type
        - biolink:publications
      ui_explanation: >-
        This edge asserts that a gene or gene product acts upstream of a biological process (GO Aspect P). GOA
        provides several 'acts upstream of' relations that were consolidated into this single edge type because
        they share the same subject/object categories and provenance; the specific predicate captures how direct
        the causal chain is (acts_upstream_of vs acts_upstream_of_or_within) and, where the source records it, the
        direction of the effect (positive/negative). The GO evidence code on the source annotation determines the
        edge's knowledge level and agent type. The relationship is represented with the corresponding Biolink
        'acts upstream of' predicate.
      source_files:
        - goa_human.gaf.gz
        - mgi.gaf.gz
        - rgd.gaf.gz
      additional_notes:
        - "Knowledge level and agent type vary per edge based on the GO evidence code of the source annotation. The ECO code is captured on each edge via has_evidence_of_type."
        - "This edge type consolidates the six upstream-effect predicates from the GAF Qualifier column, per data-modeling guidance to merge edge types that share provenance and subject/object categories. Owner review: the multivalued predicates listed here are siblings under a common 'acts upstream of' family rather than a single predicate plus strict descendants; confirm this grouping is acceptable or split as needed."

    - subject_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:MacromolecularComplex
        - biolink:RNAProduct
      predicates:
        - biolink:active_in
        - biolink:located_in
        - biolink:colocalizes_with
      object_categories:
        - biolink:CellularComponent
      knowledge_level:
        - knowledge_assertion
        - prediction
        - not_provided
      agent_type:
        - manual_agent
        - automated_agent
        - manual_validation_of_automated_agent
        - not_provided
      primary_knowledge_sources:
        - infores:goa
      supporting_data_sources:
        - infores:mgi
        - infores:rgd
        - infores:reactome
        - infores:intact
        - infores:go-cam
      edge_properties:
        - biolink:negated
        - biolink:has_evidence_of_type
        - biolink:publications
      ui_explanation: >-
        This edge relates a gene or gene product to a cellular component (GO Aspect C). GOA provides several
        cellular-component relations that were consolidated into this edge type: 'active_in' (the location where a
        gene product carries out its molecular function), 'located_in' (stable localization to a component), and
        'colocalizes_with' (transient or partial co-localization). When no qualifier is present, the predicate is
        assigned from the Aspect (C -> located_in). The GO evidence code on the source annotation determines the
        edge's knowledge level and agent type. The relationship is represented with the corresponding Biolink
        predicate.
      source_files:
        - goa_human.gaf.gz
        - mgi.gaf.gz
        - rgd.gaf.gz
      additional_notes:
        - "Knowledge level and agent type vary per edge based on the GO evidence code of the source annotation. The ECO code is captured on each edge via has_evidence_of_type."
        - "This edge type consolidates the cellular-component predicate family. Owner review: active_in, located_in, and colocalizes_with are related but not a strict predicate-plus-descendants set; confirm grouping or split as needed."

    - subject_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:RNAProduct
      predicates:
        - biolink:part_of
      object_categories:
        - biolink:MacromolecularComplex
      knowledge_level:
        - knowledge_assertion
        - prediction
        - not_provided
      agent_type:
        - manual_agent
        - automated_agent
        - manual_validation_of_automated_agent
        - not_provided
      primary_knowledge_sources:
        - infores:goa
      supporting_data_sources:
        - infores:mgi
        - infores:rgd
        - infores:reactome
        - infores:intact
        - infores:go-cam
      edge_properties:
        - biolink:negated
        - biolink:has_evidence_of_type
        - biolink:publications
      ui_explanation: >-
        This edge asserts that a gene or gene product is part of a macromolecular complex. It was created from a
        GO annotation using the 'part_of' relation against an Aspect C (cellular component) term that represents a
        complex. The GO evidence code on the source annotation determines the edge's knowledge level and agent
        type. The relationship is represented here with the Biolink 'part_of' predicate. (Note: downstream
        normalization may invert part_of to has_part; see target additional_notes.)
      source_files:
        - goa_human.gaf.gz
        - mgi.gaf.gz
        - rgd.gaf.gz
      additional_notes:
        - "Knowledge level and agent type vary per edge based on the GO evidence code of the source annotation. The ECO code is captured on each edge via has_evidence_of_type."

  node_type_info:
    - node_category: biolink:Gene
      source_identifier_types:
        - "MGI"
        - "RGD"
      node_properties:
        - biolink:name
        - biolink:in_taxon
        - biolink:description
      additional_notes:
        - "Gene subjects come from model organism databases (MGI for mouse, RGD for rat) as identified by the GAF DB column."
    - node_category: biolink:Protein
      source_identifier_types:
        - "UniProtKB"
      node_properties:
        - biolink:name
        - biolink:in_taxon
        - biolink:description
      additional_notes:
        - "Protein subjects (primarily human) are identified by UniProtKB accession from the GAF DB/DB_Object_ID columns."
    - node_category: biolink:MacromolecularComplex
      source_identifier_types:
        - "ComplexPortal"
      node_properties:
        - biolink:name
        - biolink:in_taxon
        - biolink:description
    - node_category: biolink:RNAProduct
      source_identifier_types:
        - "RNAcentral"
      node_properties:
        - biolink:name
        - biolink:in_taxon
        - biolink:description
    - node_category: biolink:BiologicalProcess
      source_identifier_types:
        - "GO (Aspect P)"
    - node_category: biolink:MolecularActivity
      source_identifier_types:
        - "GO (Aspect F)"
    - node_category: biolink:CellularComponent
      source_identifier_types:
        - "GO (Aspect C)"
    - node_category: biolink:Pathway
      source_identifier_types:
        - "GO (Aspect P, re-categorized by downstream normalization)"
      additional_notes:
        - "Not assigned by the ingest itself: downstream Babel/node normalization re-categorizes a subset of GO biological-process terms (~403 observed) as Pathway. Documented here so the resulting node category is expected rather than surprising."

  future_considerations:
    - category: qualifiers
      consideration: "Introduce qualifier-based representation if/when we decide to ingest any qualifying context on GO annotations (e.g. from Annotation Extension or With_Or_From columns)."
    - category: node_properties
      consideration: "If we ingest taxon info for gene nodes, we may need Biolink Model updates: in_taxon is currently modeled as a predicate and species_context_qualifier as an edge property, but there is no dedicated taxon node property."
    - category: spoq_pattern
      consideration: "Initial edge-type consolidation was completed for the upstream and cellular-component predicate families. Monitor whether further consolidation (or, conversely, splitting to satisfy the strict predicate-plus-descendants rule for multivalued predicates) is warranted after the next production validation run."

  additional_notes:
    - "Known post-normalization behavior: downstream Babel/normalization can transform some predicates - e.g. involved_in may be generalized to related_to, and part_of may be inverted to has_part (with subject/object swap). This is expected normalization behavior, not a defect in the GOA ingest, which emits the semantically correct source predicates. See predicate_map.json in ingest output."
    - "Known accepted validation warnings: normalization mapping involved_in edges to the broad related_to predicate, and enables edges having Gene/Protein subjects, produce domain/range warnings (~27k sampled). Edges still pass validation; the warnings reflect Biolink Model strictness."
    - "Known node re-categorization: normalization re-categorizes ~403 GO biological-process terms to Pathway; biolink:Pathway is documented in node_type_info to reflect this."
    - "Aggregator knowledge source: none is asserted on GOA edges (aggregator_knowledge_source was intentionally omitted per data-modeling review). infores:goa is the single primary knowledge source per edge."

