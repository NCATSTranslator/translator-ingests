name: Text Mining Knowledge Provider (TMKP)

# Information about the Source of the data ingest
source_info:
  infores_id: infores:text-mining-provider-targeted
  name: Text Mining Knowledge Provider (TMKP)
  description: |
    The Text Mining Knowledge Provider (TMKP) is a Translator knowledge provider that extracts
    biomedical assertions from scientific literature using advanced text mining techniques.
    It processes PubMed abstracts and full-text articles to identify relationships between
    biological entities such as chemicals, genes, diseases, and phenotypes. The system uses
    natural language processing and machine learning approaches to extract high-confidence
    assertions about how these entities interact.
  citations:
    - https://github.com/NCATSTranslator/Text-Mining-Provider-Roadmap
  terms_of_use_info:
    terms_of_use_url: null
    terms_of_use_description: "Open access data provided through the Translator consortium"
  data_access_locations:
    - https://storage.googleapis.com/translator-text-workflow-dev-public/
  data_provision_mechanisms:
    - file_download
  data_formats:
    - tar.gz
    - tsv
    - json
  data_versioning_and_releases: "Periodic releases managed through Google Cloud Storage. Version dates included in file paths."

# Information about Ingested Content
ingest_info:
  ingest_categories:
    - primary_knowledge_provider
  utility: "TMKP provides literature-mined assertions that complement manually curated knowledge sources. It enables discovery of relationships that may not be captured in structured databases, particularly for emerging research areas and novel connections between biological entities."
  scope: "Covers text-mined relationships between chemicals, genes/proteins, diseases, and phenotypes extracted from PubMed literature. Each assertion includes supporting evidence from the source text and publication metadata."

  relevant_files:
    - file_name: targeted_assertions.tar.gz
      location: https://storage.googleapis.com/translator-text-workflow-dev-public/kgx/UniProt/2023-03-05/
      description: Archive containing nodes.tsv, edges.tsv, and content_metadata.json

  included_content:
    - file_name: nodes.tsv
      included_records: All biological entities (chemicals, proteins, diseases, phenotypes)
      fields_used: id, name, category
    - file_name: edges.tsv
      included_records: All text-mined assertions between entities
      fields_used: subject, predicate, object, qualified_predicate, object_aspect_qualifier, object_direction_qualifier, relation, _attributes
    - file_name: content_metadata.json
      included_records: Metadata about available biolink classes and predicates
      fields_used: nodes, edges

  filtered_content:
    - file_name: edges.tsv
      filtered_records: Edges where subject/object ID prefixes violate Biolink Model domain/range constraints. For example, edges like "MONDO:xxx biolink:treats DRUGBANK:yyy" are excluded because the association type expects chemicals as subjects and diseases as objects, not the reverse.
      rationale: "Validation uses BMT to dynamically determine valid ID prefixes for each predicate's domain/range constraints, filtering out semantically invalid edges such as reversed ChemicalToDiseaseOrPhenotypicFeatureAssociation edges where diseases/phenotypes (MONDO, HP prefixes) are incorrectly positioned as subjects."
    - file_name: edges.tsv
      filtered_records: GeneRegulatesGeneAssociation edges that lack required qualifiers (object_aspect_qualifier or object_direction_qualifier).
      rationale: "These qualifiers are required for semantic correctness of regulatory relationships. Edges without them would have ambiguous meaning."

  future_considerations:
    - category: edge_property_content
      consideration: "Review study results data and modeling (didn't have time to review thoroughly this pass), and it may be that we can simplify modeling depending on what requirements are for this type of metadata this phase."
    - category: other
      consideration: "Consider whether it is sufficient to have RIG Edge Type objects be the source of truth for UI explanations, given that edges end up being generated in normalized KGs that don't fit into these categories. How to ensure that all edges in a KG will have an explanation, and that the UI team will be able to find and access and use these explanations easily and accurately."
    - category: edge_content
      consideration: "Approach for one-hop predictions like those described above (whether DINGO creates them at ingest, or re-instate the CQS to create them)."

  additional_notes: |
    Attributes in the data are encoded as JSON objects that may contain nested attributes
    representing supporting studies and evidence. The ingest creates Study objects containing
    TextMiningStudyResult objects to model the nested study result data structure, with
    supporting text and document references captured in the TextMiningStudyResult objects.

# Information about the Graph Output by the ingest
target_info:
  infores_id: "infores:text-mining-provider-targeted"

  edge_type_info:
    - subject_categories:
        - "biolink:SmallMolecule"
        - "biolink:ChemicalEntity"
        - "biolink:MolecularMixture"
        - "biolink:ComplexMolecularMixture"
      predicates:
        - "biolink:affects"
      object_categories:
        - "biolink:Protein"
      qualifiers:                       # MHB: Note I removed entries for subject aspect and direction qualifiers - as the summary report does not show these in the data. Add back if the TMKP code is able to create them.
        - property: "biolink:qualified_predicate"
          value_enumeration:
            - "biolink:causes"
        - property: "biolink:object_aspect_qualifier"
          value_enumeration:
            - "activity_or_abundance"
        - property: "biolink:object_direction_qualifier"
          value_enumeration:
            - "increased"
            - "decreased"
      knowledge_level:
        - not_provided
      agent_type:
        - text_mining_agent
      primary_knowledge_sources:
        - infores:text-mining-provider-targeted
      supporting_data_sources:
        - infores:pubmed
      edge_properties:                  # MHB: these don't match what I see in the data - only has_supporting_studies (not sure why we need these) Note that the summary code likely doesn't dig into nested properties.  The json examples to show the full nested study result objects under has_study_result, and the only nested properties here is publications and supporting_text. We should try to fix this up as I think some of the scores/metadata TMKP captures will be useful for scoring.
        - "biolink:has_supporting_studies"
        - "biolink:evidence_count"
        - "biolink:has_confidence_score"
      ui_explanation: |
        Targeted text mining identified that a chemical affects a protein, with causal direction
        and magnitude qualifiers indicating how the chemical modulates protein activity or abundance.
        Evidence from scientific literature includes supporting text excerpts and publication references.
      source_files:
        - edges.tsv
      additional_notes: |
        Association type: ChemicalAffectsGeneAssociation. The has_supporting_studies property
        contains Study objects with nested TextMiningStudyResult objects that include supporting
        text excerpts and publication references.

    - subject_categories:
        - "biolink:Protein"
      predicates:
        - "biolink:affects"
      object_categories:
        - "biolink:Protein"
      qualifiers:
        - property: "biolink:qualified_predicate"
          value_enumeration:
            - "biolink:affects"
        - property: "biolink:object_aspect_qualifier"
          value_enumeration:
            - "activity_or_abundance"
        - property: "biolink:object_direction_qualifier"
          value_enumeration:
            - "increased"
            - "decreased"
      knowledge_level:
        - not_provided
      agent_type:
        - text_mining_agent
      primary_knowledge_sources:
        - infores:text-mining-provider-targeted
      supporting_data_sources:
        - infores:pubmed
      edge_properties:
        - "biolink:has_supporting_studies"
        - "biolink:evidence_count"
        - "biolink:has_confidence_score"
      ui_explanation: |
        Targeted text mining identified gene regulatory relationships where one protein affects
        another protein's activity or abundance. These edges include required qualifiers indicating
        the direction and magnitude of the regulatory effect.
      source_files:
        - edges.tsv
      additional_notes: |
        Association type: GeneRegulatesGeneAssociation. Requires object_aspect_qualifier and
        object_direction_qualifier for semantic correctness. Edges lacking these qualifiers are
        filtered out during processing.

    - subject_categories:
        - "biolink:SmallMolecule"
        - "biolink:ChemicalEntity"
        - "biolink:MolecularMixture"
        - "biolink:ComplexMolecularMixture"
      predicates:
        - "biolink:treats_or_applied_or_studied_to_treat"
      object_categories:
        - "biolink:Disease"
        - "biolink:PhenotypicFeature"
      knowledge_level:
        - knowledge_assertion
      agent_type:
        - text_mining_agent
      primary_knowledge_sources:
        - infores:text-mining-provider-targeted
      supporting_data_sources:
        - infores:pubmed
      edge_properties:
        - "biolink:has_supporting_studies"
        - "biolink:evidence_count"
        - "biolink:has_confidence_score"
      ui_explanation: |
        Targeted text mining identified therapeutic or studied-for-treatment relationships where
        a chemical treats, or was applied or studied to treat, a disease or phenotypic feature.
        The broad predicate reflects that NLP cannot distinguish between actual treatment and
        studied/applied treatment relationships.
      source_files:
        - edges.tsv
      additional_notes: |
        Association type: ChemicalEntityToDiseaseOrPhenotypicFeatureAssociation. Source predicate
        'biolink:treats' is remapped to 'biolink:treats_or_applied_or_studied_to_treat' during
        ingest because NLP tools cannot reliably distinguish treatment intent. Knowledge level is
        'knowledge_assertion' because the broad predicate semantics already account for the
        uncertainty inherent in text-mined data. Source data may contain reversed edges (disease
        treats chemical) that are filtered out based on Biolink domain/range constraints.

    - subject_categories:
        - "biolink:SmallMolecule"
        - "biolink:ChemicalEntity"
        - "biolink:MolecularMixture"
        - "biolink:ComplexMolecularMixture"
      predicates:
        - "biolink:contributes_to"
      object_categories:
        - "biolink:Disease"
        - "biolink:PhenotypicFeature"
      knowledge_level:
        - not_provided
      agent_type:
        - text_mining_agent
      primary_knowledge_sources:
        - infores:text-mining-provider-targeted
      supporting_data_sources:
        - infores:pubmed
      edge_properties:
        - "biolink:has_supporting_studies"
        - "biolink:evidence_count"
        - "biolink:has_confidence_score"
      ui_explanation: |
        Targeted text mining identified that a chemical contributes to a disease or phenotypic
        feature, indicating a causal or risk relationship based on evidence from literature.
      source_files:
        - edges.tsv
      additional_notes: |
        Association type: ChemicalEntityToDiseaseOrPhenotypicFeatureAssociation. Domain/range
        validation ensures chemicals are subjects and diseases/phenotypes are objects.

    - subject_categories:
        - "biolink:Protein"
      predicates:
        - "biolink:affects"
      object_categories:
        - "biolink:Disease"
        - "biolink:PhenotypicFeature"
      qualifiers:
        - property: "biolink:qualified_predicate"
          value_enumeration:
            - "biolink:contributes_to"
        - property: "biolink:subject_form_or_variant_qualifier"
          value_enumeration:
            - "modified_form"
      knowledge_level:
        - not_provided
      agent_type:
        - text_mining_agent
      primary_knowledge_sources:
        - infores:text-mining-provider-targeted
      supporting_data_sources:
        - infores:pubmed
      edge_properties:
        - "biolink:has_supporting_studies"
        - "biolink:evidence_count"
        - "biolink:has_confidence_score"
      ui_explanation: |
        Targeted text mining identified that a protein/gene in a modified form contributes to a
        disease or phenotypic feature, indicating molecular involvement based on evidence from
        literature. Uses the canonical Biolink EPC pattern with 'affects' as the primary predicate,
        'contributes_to' as the qualified predicate, and 'modified_form' as the subject qualifier.
      source_files:
        - edges.tsv
      additional_notes: |
        Association type: CorrelatedGeneToDiseaseAssociation. Source predicate 'biolink:contributes_to'
        is transformed to the canonical EPC pattern: predicate='affects', qualified_predicate=
        'contributes_to', subject_form_or_variant_qualifier='modified_form'. The 'modified_form'
        qualifier is used rather than 'genetic_variant_form' because text mining cannot distinguish
        the specific form of protein modification contributing to disease.

    - subject_categories:
        - "biolink:Protein"
      predicates:
        - "biolink:affects"
      object_categories:
        - "biolink:Disease"
        - "biolink:PhenotypicFeature"
      knowledge_level:
        - not_provided
      agent_type:
        - text_mining_agent
      primary_knowledge_sources:
        - infores:text-mining-provider-targeted
      supporting_data_sources:
        - infores:pubmed
      edge_properties:
        - "biolink:has_supporting_studies"
        - "biolink:evidence_count"
        - "biolink:has_confidence_score"
      ui_explanation: |
        Targeted text mining identified that a protein/gene affects a disease or phenotypic
        feature, based on linguistic patterns in scientific literature.
      source_files:
        - edges.tsv
      additional_notes: |
        Association type: CorrelatedGeneToDiseaseAssociation. The code uses
        CorrelatedGeneToDiseaseAssociation rather than GeneToDiseaseAssociation because
        the base GeneToDiseaseAssociation constrains predicates to only 'contributes_to'
        or 'associated_with', and does not support 'affects' which is used by TMKP
        for gene-disease edges.

  node_type_info:
    - node_category: "biolink:ChemicalEntity"
      source_identifier_types:
        - "DRUGBANK"
      node_properties: null
      additional_notes: null
    - node_category: "biolink:Protein"
      source_identifier_types:
        - "UniProtKB"
        - "DRUGBANK"
      node_properties: null
      additional_notes: null
    - node_category: "biolink:SmallMolecule"
      source_identifier_types:
        - "DRUGBANK"
        - "CHEBI"
      node_properties: null
      additional_notes: null
    - node_category: "biolink:Disease"
      source_identifier_types:
        - "MONDO"
        - "HP"
      node_properties: null
      additional_notes: null
    - node_category: "biolink:MolecularMixture"
      source_identifier_types:
        - "DRUGBANK"
        - "CHEBI"
      node_properties: null
      additional_notes: null
    - node_category: "biolink:PhenotypicFeature"
      source_identifier_types:
        - "HP"
      node_properties: null
      additional_notes: null
    - node_category: "biolink:ComplexMolecularMixture"
      source_identifier_types:
        - "DRUGBANK"
      node_properties: null
      additional_notes: null

  future_considerations:
    - category: edge_properties
      consideration: "Review study results data and modeling - it may be that we can simplify modeling depending on what requirements are for this type of metadata. Some of the scores/metadata TMKP captures may be useful for scoring."
    - category: other
      consideration: "May want to improve ui_explanations for edge types once we understand how the UI will stitch together / display predicates and qualifier values for these edges."

  additional_notes: "All nodes created from edge records are minimal NamedThing placeholders with only an id. Richer node information (names, categories, etc.) comes from the nodes.tsv file via the node transform, or from downstream normalization."

