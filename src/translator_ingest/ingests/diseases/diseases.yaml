name: diseases

readers:
  knowledge:
    format: csv
    delimiter: "\t"
    header_mode: none
    files:
      - "diseases_knowledge.tsv"
    columns:
    ## naming all of them, assigning type if not str (default). Not actually using protein_name, disease_name, evidence_type
      - protein_id
      - protein_name
      - disease_id
      - disease_name
      - source_db
      - evidence_type
      ## actually an int, but making this float to match text-mining's attribute later
      - confidence_score: float
    filters:
      ## remove rows when source_db == "UniProtKB-KW": ingest directly through that resource instead
      ## don't need to record stats on this
      - inclusion: exclude
        column: source_db
        filter_code: eq
        value: UniProtKB-KW