name: "Multiomics Knowledge Provider (MOKG) Reference Ingest Guide"

source_info:
  infores_id: "infores:multiomics-kg"
  name: "Multiomics Knowledge Provider (Multiomics-KG)"
  description: >-
    The Multiomics Knowledge Provider (MOKG) aggregates multi-omics assertions
    derived from the biomedical literature, capturing relationships (e.g. correlation,
    association, biomarker, regulation) between genes, proteins, small molecules,
    organisms, diseases, and other biomedical entities, along with statistical
    evidence and disease/anatomical context.
  terms_of_use_info:
    terms_of_use_description: "Freely available"
  data_access_locations:
    - "Local NDJSON snapshots provided for development; stable download URL TBD"
  data_provision_mechanisms:
    - file_download
  data_formats:
    - kgx
  data_versioning_and_releases: "Release 3.0.0"

ingest_info:
  ingest_categories:
    - translator_knowledge_creator
  utility: "MOKG provides literature-derived multi-omics relationships with statistical evidence (adjusted p-value, relationship strength) and disease/anatomical context qualifiers, useful for many Translator query types."
  scope: "Curated multi-omics associations between biomedical entities (genes, proteins, chemicals, organisms, diseases, etc.)."
  relevant_files:
    - file_name: "MULTIOMICS_KG_3.0.0.nodes.ndjson"
      location: "Local development snapshot"
      description: "KGX-like node records (id, name, category, source, taxon)"
    - file_name: "MULTIOMICS_KG_3.0.0.edges.ndjson"
      location: "Local development snapshot"
      description: "KGX-like edge records with predicate, statistics, qualifiers, and provenance"
  included_content:
    - file_name: "MULTIOMICS_KG_3.0.0.edges.ndjson"
      included_records: "All multi-omics assertions, regardless of predicate"
      fields_used: >-
        subject, predicate, object, uuid, publication, sample size, multiple
        testing correction method, adjusted p value (any case), relationship
        strength, all 15 biolink qualifier columns, url, contributing
        contributors, supporting study-specific numeric columns

target_info:
  infores_id: "infores:multiomics-kg"
  node_type_info:
    - node_category: "biolink:Protein"
      source_identifier_types:
        - "UniProtKB, PR identifiers"
    - node_category: "biolink:Gene"
      source_identifier_types:
        - "NCBIGene identifiers"
    - node_category: "biolink:SmallMolecule"
      source_identifier_types:
        - "CHEBI, PUBCHEM.COMPOUND identifiers"
    - node_category: "biolink:Disease"
      source_identifier_types:
        - "MONDO identifiers"
    - node_category: "biolink:OrganismTaxon"
      source_identifier_types:
        - "NCBITaxon identifiers"
  edge_type_info:
    - subject_categories:
        - "biolink:NamedThing"
      predicates:
        - "biolink:acts_upstream_of_or_within"
        - "biolink:affects"
        - "biolink:associated_with"
        - "biolink:associated_with_increased_likelihood_of"
        - "biolink:associated_with_resistance_to"
        - "biolink:associated_with_sensitivity_to"
        - "biolink:biomarker_for"
        - "biolink:correlated_with"
        - "biolink:disease_has_location"
        - "biolink:expressed_in"
        - "biolink:gene_associated_with_condition"
        - "biolink:genetically_associated_with"
        - "biolink:is_sequence_variant_of"
        - "biolink:negatively_correlated_with"
        - "biolink:participates_in"
        - "biolink:positively_correlated_with"
        - "biolink:regulates"
        - "biolink:related_to"
      object_categories:
        - "biolink:NamedThing"
      knowledge_level:
        - knowledge_assertion
      agent_type:
        - manual_agent
      ui_explanation: >-
        MOKG edges report literature-derived multi-omics relationships, with
        statistical evidence (adjusted p-value, relationship strength) and
        disease/anatomical context captured in qualifiers. Each predicate
        routes to a typed Association subclass when one accepts the literal
        predicate and the record provides the required slot values; otherwise
        the edge falls back to the generic Association. Sample size, multiple
        testing correction method, assertion method, and other ETL metadata
        are preserved on the `has_attribute` slot, and the dozen
        study-specific numeric columns (odds ratio, hazard ratio, IVW, MR-Egger)
        are surfaced as a JSON payload on `supporting_text`.

provenance_info:
  contributions:
    - "To be filled in with code authors, domain experts, and data modelers"
