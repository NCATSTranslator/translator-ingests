# STRING source files for the ingest.
# See the kghub-downloader format: https://monarch-initiative.github.io/kghub-downloader/
# local_name must match the file referenced in string.yaml (for reader inputs) or
# loaded directly in string.py via koza.input_files_dir (for auxiliary lookup files).
---
# STRING protein-protein interaction files (one per Translator-target taxon).
# Loaded by the ``string_ppi`` tagged reader in string.yaml.
#
# We use the ``.full.`` variant (16 columns: 7 evidence channels + 6
# orthology-transferred variants + combined_score) rather than the 3-column
# ``.links.`` variant, because the per-channel subscores drive per-channel
# predicate emission. See string.py CHANNEL_PREDICATES for the channel→
# predicate mapping (matches ORION's STRING parser). File size is ~2x the
# 3-column variant.
- url: https://stringdb-downloads.org/download/protein.links.full.v12.0/9606.protein.links.full.v12.0.txt.gz
  local_name: 9606.protein.links.full.v12.0.txt.gz
- url: https://stringdb-downloads.org/download/protein.links.full.v12.0/10090.protein.links.full.v12.0.txt.gz
  local_name: 10090.protein.links.full.v12.0.txt.gz
- url: https://stringdb-downloads.org/download/protein.links.full.v12.0/10116.protein.links.full.v12.0.txt.gz
  local_name: 10116.protein.links.full.v12.0.txt.gz

# Universal STRING ↔ Entrez gene-ID mapping (all species, ~285 MB uncompressed).
# Not iterated by the reader; loaded once at transform start via on_data_begin
# to populate the ``equivalent_identifiers`` slot on Protein nodes with their
# NCBIGene equivalents. The transform filters this file by SUPPORTED_TAXA
# at load time so the resident dict only carries human, mouse, and rat entries.
# Matches the pattern used by Monarch's STRING ingest.
- url: https://string-db.org/mapping_files/entrez/all_organisms.entrez_2_string.tsv
  local_name: all_organisms.entrez_2_string.tsv

# STITCH protein-chemical interaction files (one per Translator-target taxon).
# Same 3-column shape as STRING's protein.links file but with a chemical column
# (``CIDm`` or ``CIDs`` prefix → ``PUBCHEM.COMPOUND`` CURIE after prefix stripping).
# Loaded by the ``stitch_pcl`` tagged reader in string.yaml.
- url: http://stitch.embl.de/download/protein_chemical.links.v5.0/9606.protein_chemical.links.v5.0.tsv.gz
  local_name: 9606.protein_chemical.links.v5.0.tsv.gz
- url: http://stitch.embl.de/download/protein_chemical.links.v5.0/10090.protein_chemical.links.v5.0.tsv.gz
  local_name: 10090.protein_chemical.links.v5.0.tsv.gz
- url: http://stitch.embl.de/download/protein_chemical.links.v5.0/10116.protein_chemical.links.v5.0.tsv.gz
  local_name: 10116.protein_chemical.links.v5.0.tsv.gz
