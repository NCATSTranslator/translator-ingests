name: STRING Reference Ingest Guide

# Information about the Source of the ingest
source_info:
    infores_id: infores:string
    name: Search Tool for the Retrieval of Interacting Genes/Proteins (STRING) and STITCH
    description: >-
      STRING (Search Tool for the Retrieval of Interacting Genes/Proteins) is a database of known and predicted
      protein–protein interactions hosted by SIB / EMBL / CPR. STRING aggregates evidence from seven channels —
      genomic neighborhood, gene fusion, phylogenetic co-occurrence, homology, co-expression, experiments, and text
      mining — plus curated databases, and combines them into a single ``combined_score`` per interaction pair.

      STITCH is STRING's sister database for protein–chemical interactions, sharing STRING's protein identifier
      scheme and combined_score model. Both are ingested here under tagged readers (``string_ppi`` and
      ``stitch_pcl``) in a single ingest yaml, with separate transforms emitting Protein–Protein and
      Chemical–Protein edges respectively.
    citations:
      - Szklarczyk D, Kirsch R, Koutrouli M, et al. The STRING database in 2023. Nucleic Acids Res. 2023;51(D1):D638–D646. doi:10.1093/nar/gkac1000
    terms_of_use_info:
      terms_of_use_url: https://string-db.org/cgi/access
      terms_of_use_description: >-
        STRING data is released under the Creative Commons Attribution 4.0 International License (CC BY 4.0).
      license_name: CC BY 4.0
      license_url: https://creativecommons.org/licenses/by/4.0/
    data_access_locations:
      - STRING downloads: https://stringdb-downloads.org/
      - STRING main site: https://string-db.org/
    data_provision_mechanisms:
      - file_download
      - web_interface
      - web_service_api
    data_formats:
      - TSV (gzip), space-delimited
    data_versioning_and_releases: >-
      STRING uses dotted version numbers (currently v12.0). The version is published at
      https://string-db.org/api/json/version and is embedded in download URLs (e.g. ``protein.links.v12.0/``).
      ``get_latest_version()`` resolves the version dynamically from this endpoint.

# Information about Ingested Content
ingest_info:
    ingest_categories:
      - Primary Knowledge Provider
    utility: >-
      STRING provides a broad protein–protein interaction graph derived from multiple evidence channels; STITCH adds
      a protein–chemical layer using the same scoring framework. Together they supply Translator reasoning with
      generic "these proteins interact" and "this chemical interacts with this protein" signals at human-scale.
    scope: >-
      Protein–protein interactions (STRING) and protein–chemical interactions (STITCH) for three
      Translator-target species: human (NCBITaxon:9606), mouse (NCBITaxon:10090), and rat (NCBITaxon:10116).
      Protein identifiers are kept in their native ENSEMBL form (ENSP / ENSMUSP / ENSRNOP) — no mapping to
      gene-level identifiers as canonical IDs; NCBIGene equivalents are attached via ``equivalent_identifiers``.
      Chemical identifiers from STITCH are normalized to ``PUBCHEM.COMPOUND`` CURIEs (both ``CIDm`` and ``CIDs``
      are collapsed to the underlying PubChem CID). All channel-level evidence is collapsed into a single edge
      per pair using each source's pre-computed ``combined_score``; per-channel subscores are not surfaced in
      this iteration. Future iterations may extend to additional species and per-channel predicate/qualifier
      modeling — see ``future_considerations`` below.
    relevant_files:
      - file_name: 9606.protein.links.full.v12.0.txt.gz
        location: https://stringdb-downloads.org/download/protein.links.full.v12.0/
        description: >-
          Human protein–protein interaction file, full variant (~154 MB gzipped, ~2x the 3-column .links file).
          16 space-delimited columns: protein1, protein2, 7 evidence channels (neighborhood, fusion, cooccurence,
          homology, coexpression, experiments, database, textmining), 6 orthology-transferred variants of those
          channels, and combined_score. One row per directed pair (each unordered pair appears twice). We use
          the .full variant rather than the 3-column .links variant because per-channel subscores drive
          per-channel predicate emission (see edge_type_info below).
      - file_name: 10090.protein.links.full.v12.0.txt.gz
        location: https://stringdb-downloads.org/download/protein.links.full.v12.0/
        description: >-
          Mouse (Mus musculus) protein–protein interaction file, full variant (~140 MB gzipped). Same 16-column
          shape as human.
      - file_name: 10116.protein.links.full.v12.0.txt.gz
        location: https://stringdb-downloads.org/download/protein.links.full.v12.0/
        description: >-
          Rat (Rattus norvegicus) protein–protein interaction file, full variant (~139 MB gzipped). Same
          16-column shape as human. All three PPI files drive the ``string_ppi`` tagged reader.
      - file_name: all_organisms.entrez_2_string.tsv
        location: https://string-db.org/mapping_files/entrez/
        description: >-
          Universal STRING ↔ Entrez gene-ID mapping (~285 MB uncompressed, all species in one file).
          Three tab-separated columns: NCBI taxid, Entrez gene ID, STRING protein ID. Loaded once at transform start
          via ``on_data_begin`` and used to populate ``equivalent_identifiers`` on Protein nodes with their NCBIGene
          equivalents. Filtered to ``SUPPORTED_TAXA`` at load time so resident memory stays bounded.
          Not iterated by the reader; loaded as an auxiliary lookup file via ``koza.input_files_dir``.
          Same source file used by Monarch's STRING ingest.
      - file_name: 9606.protein_chemical.links.v5.0.tsv.gz
        location: http://stitch.embl.de/download/protein_chemical.links.v5.0/
        description: >-
          STITCH human protein–chemical interaction file (~70 MB gzipped, ~14.7M rows). Three tab-separated columns:
          chemical, protein, combined_score. Chemical IDs are ``CIDm{N}`` (merged/flat) or ``CIDs{N}`` (stereo-specific)
          encoding a PubChem CID with leading zero padding; we strip the prefix and emit ``PUBCHEM.COMPOUND`` CURIEs.
      - file_name: 10090.protein_chemical.links.v5.0.tsv.gz
        location: http://stitch.embl.de/download/protein_chemical.links.v5.0/
        description: >-
          STITCH mouse protein–chemical interaction file (~154 MB gzipped). Same shape as human STITCH; larger
          because orthology-projected scores inflate the row count.
      - file_name: 10116.protein_chemical.links.v5.0.tsv.gz
        location: http://stitch.embl.de/download/protein_chemical.links.v5.0/
        description: >-
          STITCH rat protein–chemical interaction file (~145 MB gzipped). Same shape as human STITCH.
          All three STITCH files drive the ``stitch_pcl`` tagged reader. Same source files used by ORION's
          STITCH parser.
    included_content:
      - file_name: "{taxid}.protein.links.full.v12.0.txt.gz  (9606 / 10090 / 10116)"
        included_records: >-
          Rows where combined_score > 500 (STRING's medium-confidence cutoff). Symmetric duplicates (each unordered pair
          appears in both p1→p2 and p2→p1 form) are deduplicated on the sorted-pair key so each pair is emitted once.
          Same logic applies uniformly across all three per-organism files.
        fields_used: >-
          protein1, protein2 (parsed into ENSEMBL protein CURIEs — ENSP for human, ENSMUSP for mouse, ENSRNOP for rat —
          after stripping the ``{taxid}.`` taxon prefix), combined_score (used only for the row-inclusion filter;
          not attached to the output edge).
      - file_name: "{taxid}.protein_chemical.links.v5.0.tsv.gz  (9606 / 10090 / 10116)"
        included_records: >-
          Rows where combined_score > 500 (same medium-confidence cutoff as STRING). STITCH rows are directed
          (chemical → protein) and not symmetric, so no dedup is needed. Same logic applies uniformly across
          all three per-organism files.
        fields_used: >-
          chemical (``CIDm``/``CIDs`` → ``PUBCHEM.COMPOUND`` CURIE), protein (parsed into ENSEMBL protein CURIE
          via the same helper as STRING), combined_score (used only for the row-inclusion filter; not attached
          to the output edge).
    filtered_content:
      - file_name: "{taxid}.protein.links.full.v12.0.txt.gz  (all three taxa)"
        filtered_records: >-
          Rows with combined_score <= 500 are excluded.
        rationale: >-
          Below medium confidence, STRING's predictions are too noisy for Translator reasoning. Matches the default
          confidence cutoff offered on the STRING web interface.
      - file_name: "{taxid}.protein.links.full.v12.0.txt.gz  (all three taxa)"
        filtered_records: >-
          Symmetric duplicate rows (the second occurrence of any unordered protein pair).
        rationale: >-
          STRING lists each interaction in both directions. We emit one undirected edge per pair.
      - file_name: "{taxid}.protein_chemical.links.v5.0.tsv.gz  (all three taxa)"
        filtered_records: >-
          Rows with combined_score <= 500 are excluded.
        rationale: >-
          Same medium-confidence cutoff applied to STRING; consistent threshold across both ingest tags.
    future_considerations:
      # NOTE: Mouse + rat STRING + STITCH have shipped (covered by SUPPORTED_TAXA
      # 9606/10090/10116 in string.py and per-taxon files in download.yaml).
      # Remaining: extend to additional Translator-relevant organisms below.
      - category: edge_content
        consideration: >-
          Extend to additional Translator-relevant organisms beyond human/mouse/rat (zebrafish, fly, worm, yeast)
          by ingesting their per-taxon STRING and STITCH files. The transform code accepts arbitrary taxa via the
          ``SUPPORTED_TAXA`` dict in ``string.py``; adding a species is a one-line code change plus 2 download URLs
          (PPI + STITCH) and 2 reader file entries per species. Note that non-vertebrate species may use protein ID
          schemes other than ENSEMBL (e.g. yeast uses ORF names like ``YAL001C``); the parser would accept them but
          downstream NodeNormalizer coverage should be probed first.
        relevant_files: "{taxon}.protein.links.v12.0.txt.gz, {taxon}.protein_chemical.links.v5.0.tsv.gz"
      # NOTE: Per-channel predicate emission has shipped — the transform reads
      # ``.full.v12.0`` and fires one of 6 channel-specific predicates plus a
      # fallback when channel scores exceed 750. See edge_type_info above.
      - category: edge_property_content
        consideration: >-
          Surface per-channel subscores as edge properties (not just predicate-driving signals). Currently the
          channel scores are consumed by the predicate-selection rule and discarded; downstream consumers don't
          see the actual COEXPRESSION/EXPERIMENTS/TEXTMINING numbers on the edge. Attach them as
          ``biolink:Attribute`` instances on each edge, named after the channel. The data is already in the
          ``.full`` file we read; this is a transform-only change.
        relevant_files: "{taxid}.protein.links.full.v12.0.txt.gz (already ingested)"
      - category: edge_property_content
        consideration: >-
          Per-channel KL/AT instead of uniform ``not_provided``. Matches ORION's behavior: each channel maps to
          a specific KnowledgeLevel/AgentType (e.g. EXPERIMENTS → knowledge_assertion+manual_agent; TEXTMINING →
          not_provided+text_mining_agent), with overrides when multiple channels are high-confidence. Defers
          to ORION's choices in the absence of a Translator-wide convention. We elected uniform
          ``not_provided`` for this iteration to keep the plumbing simple; the per-channel KL/AT logic adds
          real semantic value.
        relevant_files: "{taxid}.protein.links.full.v12.0.txt.gz (already ingested)"
      # NOTE: STITCH integration has shipped (the ``stitch_pcl`` tag) for human,
      # mouse, and rat. Remaining STITCH work: surface per-channel subscores via
      # ``protein_chemical.links.detailed.v5.0.tsv.gz``; add mode-of-action from
      # ``actions.v5.0.tsv`` (would split STITCH's generic ``interacts_with`` into
      # specific predicates: ``activation``, ``inhibition``, ``binding``, etc.).
      - category: edge_property_content
        consideration: >-
          Ingest STITCH's ``actions.v5.0.tsv`` file (mode-of-action: activation, inhibition, binding, catalysis,
          reaction, expression, pred_bind). Would let STITCH emit specific predicates instead of the generic
          ``biolink:interacts_with``, materially sharpening the protein-chemical edges.
        relevant_files: "{taxon}.actions.v5.0.tsv.gz"
      - category: node_content
        consideration: >-
          Ingest ``protein.aliases.v12.0.txt.gz`` to populate node ``name`` and ``synonym`` properties. Currently nodes
          carry only the ENSEMBL ID as their identifier; biolink validation flags this with INFO-level "missing
          recommended name" warnings on every node.
        relevant_files: 9606.protein.info.v12.0.txt.gz, 9606.protein.aliases.v12.0.txt.gz
    additional_notes: >-
      Current scope: STRING + STITCH for human, mouse, and rat. STRING emits 6 per-channel predicates
      (physically_interacts_with, coexpressed_with, interacts_with, genetic_neighborhood_of, gene_fusion_with,
      genetically_interacts_with) plus a fallback ``physically_interacts_with`` for rows that pass the
      combined-score gate without any high-confidence channel. The predicate-selection rule matches ORION's
      STRING parser to maintain downstream compatibility with the existing Translator KP ecosystem (Automat
      STRING-DB, RoboKOP). HOMOLOGY channel is deliberately excluded from predicate emission because STRING's
      HOMOLOGY score means "inferred via orthologs in another species" not "A is homologous to B."

      The ``future_considerations`` section lists the principal axes along which the ingest could continue to
      grow: per-channel subscores as edge properties, per-channel KL/AT (currently uniform ``not_provided``),
      mode-of-action splitting for STITCH, additional non-mammalian species, node names from
      protein.aliases, and physical-subnetwork filtering.

# Information about the Graph Output by the ingest
target_info:
    infores_id: infores:string
    edge_type_info:
      # STRING per-channel edges (``string_ppi`` tag).
      #
      # The transform reads STRING's ``protein.links.full.v12.0.txt.gz`` (16
      # columns: 7 channels + 6 _transferred variants + combined_score) and
      # emits one edge per evidence channel whose score exceeds the
      # high-confidence per-channel threshold (>750). Rows are gated by
      # ``combined_score > 500``. If no channel exceeds 750 but the row
      # passes the combined-score gate, a single fallback
      # ``physically_interacts_with`` edge is emitted (matches ORION's
      # behavior). Up to 6 edges per pair; typically 1–2.
      #
      # The HOMOLOGY channel is intentionally excluded from predicate
      # emission: STRING's HOMOLOGY score means "interaction inferred via
      # orthologs in another species", not "A is homologous to B" — so
      # mapping it to ``biolink:homologous_to`` would be a semantic
      # misread (per ORION's comment). DATABASE is similarly excluded.
      #
      # Common attributes across all 6 edge types: subject/object categories
      # = biolink:Protein; species_context_qualifier ∈ {9606, 10090, 10116};
      # knowledge_level = not_provided; agent_type = not_provided;
      # primary_knowledge_source = infores:string.
      #
      # Per-edge differences: predicate, biolink class, and has_attribute
      # (only physically_interacts_with carries MI:0915).
      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:physically_interacts_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        knowledge_level: [not_provided]
        agent_type: [not_provided]
        edge_properties:
          # PSI-MI MI:0915 (physical association) attached only here — the
          # semantically matched predicate. Other per-channel edges below
          # omit has_attribute.
          - has_attribute: [MI:0915]
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Driven by the EXPERIMENTS channel (when score > 750) and as the fallback predicate when no channel
          exceeds 750. Represents direct experimental evidence of physical binding between two proteins.
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:coexpressed_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        knowledge_level: [not_provided]
        agent_type: [not_provided]
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Driven by the COEXPRESSION channel (score > 750). Indicates that the two proteins' coding genes are
          transcriptionally co-expressed across conditions. Emitted as a ``biolink:GeneToGeneCoexpressionAssociation``
          rather than ``biolink:PairwiseMolecularInteraction`` because biolink does not classify coexpression
          as a molecular interaction.
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:interacts_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        knowledge_level: [not_provided]
        agent_type: [not_provided]
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Driven by the TEXTMINING channel (score > 750). Text-mining co-mention evidence is loose semantically
          (the proteins co-occur in literature) so the predicate is the generic ``biolink:interacts_with``
          rather than something stronger.
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:genetic_neighborhood_of
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        knowledge_level: [not_provided]
        agent_type: [not_provided]
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Driven by the NEIGHBORHOOD channel (score > 750). Indicates that the coding genes of the two proteins
          are genomic neighbors (commonly co-located in prokaryotic operons or conserved gene clusters across
          species).
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:gene_fusion_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        knowledge_level: [not_provided]
        agent_type: [not_provided]
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Driven by the FUSION channel (score > 750). Indicates that the two proteins' coding genes appear as a
          single fused gene in at least one other genome — a strong indicator of functional association.
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:genetically_interacts_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        knowledge_level: [not_provided]
        agent_type: [not_provided]
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Driven by the COOCCURRENCE channel (score > 750). Indicates that the two proteins' coding genes show
          a similar phylogenetic distribution across organisms — present together or absent together — a
          phylogenetic-profile signal of functional coupling.
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

      # STITCH protein–chemical interactions (``stitch_pcl`` tag).
      - subject_categories:
          - biolink:ChemicalEntity
        predicates:
          - biolink:interacts_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606    # Homo sapiens
              - NCBITaxon:10090   # Mus musculus
              - NCBITaxon:10116   # Rattus norvegicus
        knowledge_level:
          # STITCH's combined_score aggregates across binding assays, manual
          # curation, text mining, and database co-occurrence. Same rationale
          # as STRING: not an explicit curator assertion, so ``not_provided``
          # is the honest punt.
          - not_provided
        agent_type:
          - not_provided
        edge_properties:
          # PSI-MI root term: STITCH doesn't characterize the kind of
          # protein-chemical interaction (binding, modulation, substrate),
          # so ``MI:0190`` (interaction) is the most defensible choice.
          - has_attribute:
              - MI:0190
        primary_knowledge_sources:
          - infores:stitch
        ui_explanation: >-
          STITCH provides a chemical-centric companion to STRING, aggregating evidence for protein-chemical
          interactions across binding assays, manual curation databases, and text mining into a single combined_score.
          An edge with this predicate is emitted for any chemical-protein pair whose combined_score exceeds 500.
          STITCH does not characterize the *kind* of interaction (binding, modulation, substrate) on a per-row
          basis, so we use the loose ``biolink:interacts_with`` predicate.
        source_files:
          - 9606.protein_chemical.links.v5.0.tsv.gz
          - 10090.protein_chemical.links.v5.0.tsv.gz
          - 10116.protein_chemical.links.v5.0.tsv.gz

    node_type_info:
      - node_category: biolink:Protein
        # Source identifier types reflect the canonical post-normalization identifier
        # set on Protein nodes in the merged Translator graph (as seen on Automat's
        # STRING-DB KP). The ingest itself emits ``ENSEMBL`` as the node id and
        # populates ``equivalent_identifiers`` with ``NCBIGene`` CURIEs from the
        # entrez_2_string mapping file. UniProtKB and PR equivalents are filled in
        # downstream by the Translator NodeNormalizer (~98.5% of human ENSPs resolve;
        # the remainder are retired ENSEMBL IDs that STRING v12.0 still ships).
        source_identifier_types:
          - ENSEMBL
          - UniProtKB
          - PR
        node_properties:
          - in_taxon
          - equivalent_identifiers
        additional_notes: >-
          Protein nodes use STRING's native identifiers — ENSEMBL protein IDs that vary by species: ENSP (human),
          ENSMUSP (mouse), ENSRNOP (rat). The leading ``{taxid}.`` prefix is stripped and the result is prefixed
          with ``ENSEMBL:``. Each node carries ``in_taxon`` derived from the row's taxon prefix, and (when a
          STRING ↔ Entrez mapping exists) ``equivalent_identifiers`` listing one or more ``NCBIGene:`` CURIEs.
          This explicit equivalence is the hybrid design choice that aligns with both Monarch's gene-endpoint
          ingest pattern (Kevin Schaper, 2026-05) and the Translator NodeNormalizer's expectations, without
          forcing a gene-centric reshape of the graph. NodeNormalizer resolution verified at 98.5% (human),
          100% (mouse), 98% (rat) on sample probes.

      - node_category: biolink:ChemicalEntity
        # Emitted by the ``stitch_pcl`` tagged transform. STITCH chemical IDs
        # use ``CIDm`` (merged/flat) or ``CIDs`` (stereo-specific) prefixes
        # encoding a PubChem CID with leading zeros; we strip the prefix and
        # emit ``PUBCHEM.COMPOUND`` CURIEs.
        source_identifier_types:
          - PUBCHEM.COMPOUND
        node_properties: []
        additional_notes: >-
          Emitted only by the ``stitch_pcl`` tag from ``9606.protein_chemical.links.v5.0.tsv.gz``. Chemical IDs are
          parsed via ``parse_stitch_chemical_id``: strip the 4-char ``CIDm``/``CIDs`` prefix, drop leading zeros,
          prefix with ``PUBCHEM.COMPOUND:``. STITCH does not distinguish merged vs stereo-specific compounds in
          its scoring; we collapse both to the same PubChem CID. No ``in_taxon`` qualifier — chemicals are
          species-agnostic.

