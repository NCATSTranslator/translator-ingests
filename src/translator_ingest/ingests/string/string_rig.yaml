name: STRING Reference Ingest Guide

# Information about the Source of the ingest
source_info:
    infores_id: infores:string
    name: Search Tool for the Retrieval of Interacting Genes/Proteins (STRING)
    description: >-
      STRING (Search Tool for the Retrieval of Interacting Genes/Proteins) is a database of known and predicted
      protein‚Äìprotein interactions hosted by SIB / EMBL / CPR. STRING aggregates evidence from seven channels ‚Äî
      genomic neighborhood, gene fusion, phylogenetic co-occurrence, homology, co-expression, experiments, and text
      mining ‚Äî plus curated databases, and combines them into a single ``combined_score`` per interaction pair.
    citations:
      - Szklarczyk D, Kirsch R, Koutrouli M, et al. The STRING database in 2023. Nucleic Acids Res. 2023;51(D1):D638‚ÄìD646. doi:10.1093/nar/gkac1000
    terms_of_use_info:
      terms_of_use_url: https://string-db.org/cgi/access
      terms_of_use_description: >-
        STRING data is released under the Creative Commons Attribution 4.0 International License (CC BY 4.0).
      license_name: CC BY 4.0
      license_url: https://creativecommons.org/licenses/by/4.0/
    data_access_locations:
      - STRING downloads: https://stringdb-downloads.org/
      - STRING main site: https://string-db.org/
    data_provision_mechanisms:
      - file_download
      - web_interface
      - web_service_api
    data_formats:
      - TSV (gzip), space-delimited
    data_versioning_and_releases: >-
      STRING uses dotted version numbers (currently v12.0). The version is published at
      https://string-db.org/api/json/version and is embedded in download URLs (e.g. ``protein.links.v12.0/``).
      ``get_latest_version()`` resolves the version dynamically from this endpoint.

# Information about Ingested Content
ingest_info:
    ingest_categories:
      - Primary Knowledge Provider
    utility: >-
      STRING provides a broad protein‚Äìprotein interaction graph derived from multiple evidence channels. The combined
      score reflects an aggregate confidence across these channels and supports Translator reasoning that benefits from
      a generic "these proteins interact" signal between human proteins.
    scope: >-
      Human protein‚Äìprotein interactions only. STRING protein identifiers are kept in their native ENSEMBL protein form
      (no mapping to gene-level identifiers). All channel-level evidence is collapsed into a single edge per pair using
      STRING's pre-computed ``combined_score``; per-channel subscores are not surfaced in this iteration. Future
      iterations may extend to additional model organisms, STITCH protein‚Äìchemical interactions, and per-channel
      predicate/qualifier modeling ‚Äî see ``future_considerations`` below.
    relevant_files:
      - file_name: 9606.protein.links.v12.0.txt.gz
        location: https://stringdb-downloads.org/download/protein.links.v12.0/
        description: >-
          Human protein‚Äìprotein interaction file. Three space-delimited columns: protein1, protein2, combined_score.
          One row per directed pair (each unordered pair appears twice).
      - file_name: all_organisms.entrez_2_string.tsv
        location: https://string-db.org/mapping_files/entrez/
        description: >-
          Universal STRING ‚Üî Entrez gene-ID mapping (~285 MB uncompressed, all species in one file).
          Three tab-separated columns: NCBI taxid, Entrez gene ID, STRING protein ID. Loaded once at transform start
          via ``on_data_begin`` and used to populate ``equivalent_identifiers`` on Protein nodes with their NCBIGene
          equivalents. Not iterated by the reader; loaded as an auxiliary lookup file via
          ``koza.input_files_dir``. Same source file used by Monarch's STRING ingest.
    included_content:
      - file_name: 9606.protein.links.v12.0.txt.gz
        included_records: >-
          Rows where combined_score > 500 (STRING's medium-confidence cutoff). Symmetric duplicates (each unordered pair
          appears in both p1‚Üíp2 and p2‚Üíp1 form) are deduplicated on the sorted-pair key so each pair is emitted once.
        fields_used: >-
          protein1, protein2 (parsed into ENSEMBL protein CURIEs after stripping the ``9606.`` taxon prefix),
          combined_score (used only for the row-inclusion filter; not attached to the output edge).
    filtered_content:
      - file_name: 9606.protein.links.v12.0.txt.gz
        filtered_records: >-
          Rows with combined_score <= 500 are excluded.
        rationale: >-
          Below medium confidence, STRING's predictions are too noisy for Translator reasoning. Matches the default
          confidence cutoff offered on the STRING web interface.
      - file_name: 9606.protein.links.v12.0.txt.gz
        filtered_records: >-
          Symmetric duplicate rows (the second occurrence of any unordered protein pair).
        rationale: >-
          STRING lists each interaction in both directions. We emit one undirected edge per pair.
    future_considerations:
      - category: edge_content
        consideration: >-
          Extend to additional Translator-relevant organisms (mouse, rat, zebrafish, fly, worm, yeast) by ingesting the
          corresponding per-taxon files from STRING. The transform code already accepts arbitrary taxa via the
          ``SUPPORTED_TAXA`` dict in ``string.py``; only the reader yaml needs to point at the additional files.
        relevant_files: "{taxon}.protein.links.v12.0.txt.gz"
      - category: edge_property_content
        consideration: >-
          Switch to ``protein.links.detailed.v12.0.txt.gz`` (or ``protein.links.full.v12.0.txt.gz``) to surface the
          per-channel subscores as edge properties: NEIGHBORHOOD, FUSION, COOCCURENCE, COEXPRESSION, EXPERIMENTS,
          DATABASE, TEXTMINING (plus HOMOLOGY and the ``*_transferred`` orthology-projected variants in the ``full``
          file). This enables downstream filtering by evidence type without requiring re-ingestion.
        relevant_files: 9606.protein.links.detailed.v12.0.txt.gz, 9606.protein.links.full.v12.0.txt.gz
      - category: predicate_mapping
        consideration: >-
          Once per-channel subscores are surfaced, consider emitting channel-specific predicates such as
          ``biolink:coexpressed_with`` (COEXPRESSION-dominant), ``biolink:homologous_to`` (HOMOLOGY), and the generic
          ``biolink:related_to`` (text-mined / phylogenetic-only) ‚Äî matching the predicate vocabulary used by RENCI's
          Automat STRING-DB knowledge provider.
        relevant_files: 9606.protein.links.full.v12.0.txt.gz
      - category: edge_content
        consideration: >-
          Restrict to the physical subnetwork via ``protein.physical.links.v12.0.txt.gz`` for edges that are
          semantically defensible under the ``biolink:physically_interacts_with`` predicate. The current functional
          network includes text-mining and co-expression evidence that does not, on its own, imply physical contact.
          A dual-source design (physical ‚Üí ``physically_interacts_with`` + MI:0915; functional ‚Üí ``interacts_with`` +
          MI:0190) is planned.
        relevant_files: "{taxon}.protein.physical.links.v12.0.txt.gz"
      - category: edge_content
        consideration: >-
          Ingest STITCH (``{taxon}.protein_chemical.links.v5.0.tsv.gz``) to add protein‚Äìchemical interactions, mapping
          STITCH ``CIDm``/``CIDs`` identifiers to ``PUBCHEM.COMPOUND`` CURIEs. Will introduce a ``biolink:ChemicalEntity``
          node type and protein ‚Üí chemical edges.
        relevant_files: "{taxon}.protein_chemical.links.v5.0.tsv.gz"
      - category: node_content
        consideration: >-
          Ingest ``protein.aliases.v12.0.txt.gz`` to populate node ``name`` and ``synonym`` properties. Currently nodes
          carry only the ENSEMBL ID as their identifier; biolink validation flags this with INFO-level "missing
          recommended name" warnings on every node.
        relevant_files: 9606.protein.info.v12.0.txt.gz, 9606.protein.aliases.v12.0.txt.gz
    additional_notes: >-
      This is a deliberately reduced first iteration: human-only, single predicate, no subscores, no STITCH. The
      ``future_considerations`` section lists the principal axes along which the ingest is expected to grow. Each
      extension is independent and can be added without revisiting the core transform.

# Information about the Graph Output by the ingest
target_info:
    infores_id: infores:string
    edge_type_info:
      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:physically_interacts_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
        knowledge_level:
          # STRING's combined_score is a computational aggregation across heterogeneous
          # evidence channels rather than an explicit curator claim. ``not_provided``
          # is the honest punt ‚Äî matches Automat's STRING-DB KP. Reconsider only if
          # we ingest the per-channel detailed file and emit channel-specific edges
          # with stronger semantics (e.g. EXPERIMENTS-only edges could justify
          # ``knowledge_assertion``).
          - not_provided
        agent_type:
          - not_provided
        edge_properties:
          # PSI-MI interaction-type CURIE attached to every edge via the biolink
          # ``has_attribute`` slot. MI:0915 is "physical association" ‚Äî matches the
          # claim made by ``biolink:physically_interacts_with``. When the functional
          # source is added under ``biolink:interacts_with``, that edge type will
          # carry MI:0190 (interaction) instead. See CHANGELOG.md for the slot/term
          # rationale.
          - has_attribute:
              - MI:0915
        primary_knowledge_sources:
          - infores:string
        ui_explanation: >-
          STRING aggregates evidence from seven channels into a single ``combined_score`` per protein pair. An edge with
          this predicate is emitted for any human protein pair whose combined_score exceeds 500. The specific channel(s)
          contributing to the score are not currently surfaced on the edge ‚Äî see ``future_considerations`` for the
          per-channel modeling roadmap.
        source_files:
          - 9606.protein.links.v12.0.txt.gz

    node_type_info:
      - node_category: biolink:Protein
        # Source identifier types reflect the canonical post-normalization identifier
        # set on Protein nodes in the merged Translator graph (as seen on Automat's
        # STRING-DB KP). The ingest itself emits ``ENSEMBL`` as the node id and
        # populates ``equivalent_identifiers`` with ``NCBIGene`` CURIEs from the
        # entrez_2_string mapping file. UniProtKB and PR equivalents are filled in
        # downstream by the Translator NodeNormalizer (~98.5% of human ENSPs resolve;
        # the remainder are retired ENSEMBL IDs that STRING v12.0 still ships).
        source_identifier_types:
          - ENSEMBL
          - UniProtKB
          - PR
        node_properties:
          - in_taxon
          - equivalent_identifiers
        additional_notes: >-
          Protein nodes use STRING's native identifiers, which are ENSEMBL protein IDs (e.g. ENSP00000000233). The
          leading ``9606.`` taxon prefix is stripped and the result is prefixed with ``ENSEMBL:``. Each node carries
          ``in_taxon = NCBITaxon:9606`` and (when a STRING ‚Üî Entrez mapping exists) ``equivalent_identifiers``
          listing one or more ``NCBIGene:`` CURIEs. This explicit equivalence is the hybrid design choice that
          aligns with both Monarch's gene-endpoint ingest pattern (Kevin Schaper, 2026-05) and the Translator
          NodeNormalizer's expectations, without forcing a gene-centric reshape of the graph.

      - node_category: biolink:ChemicalEntity
        # Declared as a canonical target node type, not currently emitted. STITCH
        # protein‚Äìchemical edges (see ``ingest_info.future_considerations``) would
        # populate this category. Automat ships STRING + STITCH as a merged KP, so
        # ChemicalEntity is the natural co-resident node type for this graph.
        source_identifier_types:
          - PUBCHEM.COMPOUND
        node_properties: []
        additional_notes: >-
          Not emitted by the current ingest. Reserved for the planned STITCH (``protein_chemical.links``) extension,
          which will map STITCH ``CIDm`` / ``CIDs`` identifiers to ``PUBCHEM.COMPOUND`` CURIEs.

