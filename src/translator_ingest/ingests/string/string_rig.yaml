name: STRING Reference Ingest Guide
source_info:
    infores_id: infores:string
    name: Search Tool for the Retrieval of Interacting Genes/Proteins (STRING)
    description: >-
      STRING (Search Tool for the Retrieval of Interacting Genes/Proteins) is a database of known and predicted
      protein–protein interactions hosted by SIB / EMBL / CPR. STRING aggregates evidence from seven channels —
      gene fusion, phylogenetic co-occurrence, homology, co-expression, experiments,
      and text mining — plus curated databases, and combines them into a single "combined_score" per interaction pair.

      The knowledge is generated by integrating experimentally determined interaction data, curated biological pathway resources,
      computational analyses of genomes and gene evolution, large-scale gene expression analyses, automated text mining of the
      biomedical literature, and statistical evidence integration methods that assign confidence scores while preserving
      the contribution of each evidence channel.

      The STRING "combined_score" does not measure interaction strength, binding affinity, or the magnitude of
      the biological effect. Instead, it reflects how strongly the available data support the presence of a
      biological association. A high STRING score therefore does not imply that the interaction is
      strong or stable at the biochemical level.

      Importantly, STRING calibrates each channel score against a reference set of curated pathway associations
      (e.g. KEGG, Reactome) rather than using raw co-occurrence or correlation values directly. A STRING score
      of 0.70 means: protein pairs at this evidence level have historically co-occurred in the same curated pathway
      at a rate corresponding to that confidence level. This calibration applies uniformly across all channels —
      textmining, coexpression, experiments, etc. — so the combined_score is a principled probabilistic estimate of
      functional association, not merely a count of supporting data points.

      Each protein encoded by a single gene locus.  Since STRING proteins are not all human-specific or higher
      mammalian in origin, nor even eukaryotic, only of subset of STRING data will be ingested into the Translator KG.
      Certain STRING channels are not relevant to the Translator KG (i.e.,"neighborhood" is generally non-eukaryotic).
    citations:
      - https://doi.org/10.1093/nar/gkac1000
    terms_of_use_info:
      terms_of_use_url: https://string-db.org/cgi/access
      terms_of_use_description: >-
        STRING data is released under the Creative Commons Attribution 4.0 International License (CC BY 4.0).
      license_name: CC BY 4.0
      license_url: https://creativecommons.org/licenses/by/4.0/
    data_access_locations:
      - STRING downloads: https://stringdb-downloads.org/
      - STRING main site: https://string-db.org/
    data_provision_mechanisms:
      - file_download
    data_formats:
      - TSV (gzip), space-delimited
    data_versioning_and_releases: >-
      STRING uses dotted version numbers (currently v12.0). The version is published at
      https://string-db.org/api/json/version and is embedded in download URLs (e.g. "protein.links.v12.0/").
      "get_latest_version()" resolves the version dynamically from this endpoint.

    source_status:
      maintained_as_regular_updates

# Information about Ingested Content
ingest_info:
    ingest_categories:
      - Primary Knowledge Provider
    utility: >-
      STRING provides a broad protein–protein functional association graph derived from multiple evidence channels,
      supplying Translator reasoning with interaction and coexpression data for proteins across human,
      mouse, and rat, supported by diverse evidence ("channels").
    scope: >-
      Protein–protein functional associations for three Translator-target species: human (NCBITaxon:9606),
      mouse (NCBITaxon:10090), and rat (NCBITaxon:10116). Protein identifiers are kept in their native
      ENSEMBL forms (ENSP / ENSMUSP / ENSRNOP); NCBIGene equivalents are attached via "equivalent_identifiers".
      Three edge types are emitted per qualifying protein pair:
        (1) an always-present "biolink:associated_with + association_basis_qualifier:Functional" edge for every pair
            with combined_score > 700, carrying the calibrated combined score as "stringdb_combined_score";
        (2) an additional "biolink:directly_physically_interacts_with" edge when the experiments channel score
            exceeds the experimental evidence threshold (cutoff TBD, pending Vlado's recommendation),
            carrying the experiments score as "stringdb_experimental_score";
        (3) an additional "biolink:coexpressed_with" edge when the coexpression channel score exceeds the
            coexpression threshold (cutoff TBD, pending Vlado's recommendation),
            carrying the coexpression score as "stringdb_coexpression_score".
      PENDING BLOCKERS: (A) biolink PR for association_basis_qualifier enum {Statistical, Genetic, Functional};
      (B) attributes.yaml PR for the three stringdb_* edge properties; (C) Vlado's threshold recommendations.
    relevant_files:
      - file_name: 9606.protein.links.full.v12.0.txt.gz
        location: https://stringdb-downloads.org/download/protein.links.full.v12.0/
        description: >-
          Human protein–protein interaction file, full variant (~154 MB gzipped, ~2x the 3-column .links file).
          16 space-delimited columns: protein1, protein2, 7 evidence channels (neighborhood, fusion, cooccurence,
          homology, coexpression, experiments, database, textmining), 6 orthology-transferred variants of those
          channels, and the "combined_score". One row per directed pair (each unordered pair appears twice).
          We use the .full variant because per-channel subscores drive channel-specific edges and score properties.
          Mouse and rat also ingested in the same way; all three PPI files are processed by a single "string_ppi"
          tagged reader.
      - file_name: 10090.protein.links.full.v12.0.txt.gz
        location: https://stringdb-downloads.org/download/protein.links.full.v12.0/
        description: >-
          Mouse (Mus musculus) protein–protein interaction file, full variant (~140 MB gzipped).
          Same 16-column shape as human.
      - file_name: 10116.protein.links.full.v12.0.txt.gz
        location: https://stringdb-downloads.org/download/protein.links.full.v12.0/
        description: >-
          Rat (Rattus norvegicus) protein–protein interaction file, full variant (~139 MB gzipped).
          Same 16-column shape as human.
      - file_name: all_organisms.entrez_2_string.tsv
        location: https://string-db.org/mapping_files/entrez/
        description: >-
          Universal STRING to Entrez gene-ID mapping (~285 MB uncompressed, all STRING species in one file).
          Three tab-separated columns: NCBI taxid, Entrez gene ID, STRING protein ID. Loaded once at transform start
          via "on_data_begin" and used to populate "equivalent_identifiers" on Protein nodes with their NCBIGene
          equivalents. Filtered to "SUPPORTED_TAXA" at load time so resident memory stays bounded.
          Not iterated by the reader; loaded as an auxiliary lookup file via "koza.input_files_dir".
          Same source file used by Monarch's STRING ingest.
    included_content:
      - file_name: "{NCBI Taxon ID}.protein.links.full.v12.0.txt.gz" # (9606 / 10090 / 10116)
        included_records: >-
          Rows where combined_score > 700 (STRING's high-confidence cutoff). Symmetric duplicates
          (each unordered pair appears in both p1→p2 and p2→p1 form) are deduplicated on the sorted-pair key
          so each pair is emitted once per edge type. Same logic applies uniformly across all three per-organism files.
        fields_used: >-
          protein1, protein2 (parsed into ENSEMBL protein CURIEs — ENSP for human, ENSMUSP for mouse, ENSRNOP for rat
          after stripping the "{NCBI Taxon ID}." taxon prefix); combined_score filters row inclusion and is stored
          as "stringdb_combined_score" on the associated_with edge; experiments channel score drives the conditional
          directly_physically_interacts_with edge and is stored as "stringdb_experimental_score";
          coexpression channel score drives the conditional coexpressed_with edge and is stored as
          "stringdb_coexpression_score".
    filtered_content:
      - file_name: "{NCBI Taxon ID}.protein.links.full.v12.0.txt.gz" # (all three taxa)
        filtered_records: >-
          Rows with combined_score <= 700 are excluded.
        rationale: >-
          STRING's high-confidence cutoff (0.70). Below this level, the calibrated evidence score is insufficient
          to assert even a general functional association. Raised from the prior 500 (medium-confidence) threshold
          following the 2026-07-17 call decision to restrict to high-confidence functional associations.
      - file_name: "{NCBI Taxon ID}.protein.links.full.v12.0.txt.gz" # (all three taxa)
        filtered_records: >-
          Symmetric duplicate rows (the second occurrence of any unordered protein pair per edge type).
        rationale: >-
          STRING lists each interaction in both directions. We emit one undirected edge per pair per edge type.
      - file_name: "{NCBI Taxon ID}.protein.links.full.v12.0.txt.gz" # (all three taxa)
        filtered_records: >-
          The neighborhood, fusion, cooccurence, homology, database, and textmining channels are not used to
          generate separate edges in the current iteration.
        rationale: >-
          neighborhood: scores are 0 for all eukaryotic proteins (prokaryote-specific genomic context).
          fusion, cooccurence: these channels produce valid but limited signal in mammalian genomes; the biolink
          predicates previously used (gene_fusion_with, genetically_interacts_with) have domain/range=Gene but
          STRING nodes are Protein — a domain/range violation confirmed by build-validation errors. They are also
          absent from the Automat STRING-DB meta_knowledge_graph.
          homology, database: aggregated into the combined_score but do not drive distinct edge semantics
          under the new model.
          textmining: co-mention evidence is retained in the combined_score (which drives the associated_with edge)
          but does not warrant a separate edge claim in the current iteration. The calibration note in source_info
          explains why high textmining scores can be meaningful even when raw co-mention frequency is unimpressive;
          the ongoing investigation into re-weighting its contribution to combined_score (see future_considerations)
          may affect this decision.
    future_considerations:
      - category: edge_content
        consideration: >-
          Extend to additional Translator-relevant organisms beyond human/mouse/rat (zebrafish, fly, worm, yeast).
          The transform accepts arbitrary taxa via the "SUPPORTED_TAXA" dict in "string.py"; adding a species
          is a one-line code change plus a download URL and a reader file entry. Note that non-vertebrate species
          may use protein ID schemes other than ENSEMBL (e.g. yeast uses ORF names like "YAL001C"); the parser
          would accept them but downstream NodeNormalizer coverage should be probed first.
        relevant_files: "{NCBI Taxon ID}.protein.links.full.v12.0.txt.gz"
      - category: edge_content
        consideration: >-
          Text mining channel discounting / score recomputation. STRING's combined_score incorporates the textmining
          channel, which in turn is calibrated against curated pathway co-occurrence rather than raw literature
          co-mention. Even so, the community (7-10-26 call) identified concern about the degree to which
          textmining co-occurrence contribution inflates combined_score for well-studied protein pairs. A future
          iteration could investigate re-computing scores with textmining down-weighted or excluded, using STRING's
          published scoring algorithm (Bayesian channel integration), and compare the resulting association set
          against the current output to assess the impact on edge quality.
        relevant_files: "{NCBI Taxon ID}.protein.links.full.v12.0.txt.gz"
      - category: edge_property_content
        consideration: >-
          Surface additional per-channel subscores as edge properties. The current iteration captures
          stringdb_combined_score (on associated_with), stringdb_experimental_score
          (on directly_physically_interacts_with), and stringdb_coexpression_score (on coexpressed_with).
          The remaining channels (textmining, fusion, cooccurence, neighborhood, homology) are in the .full file
          but not stored. Downstream consumers needing channel-level provenance would benefit from access to
          these values.
        relevant_files: "{NCBI Taxon ID}.protein.links.full.v12.0.txt.gz (already ingested)"
      - category: edge_content
        consideration: >-
          Supporting data sources per edge. STRING aggregates from named databases (BioGRID, IntAct, KEGG,
          Reactome, etc.) per evidence channel. The current file format (protein.links.full) does not report
          which source databases contributed to a given pair's score; that detail is available in STRING's
          per-interaction detail endpoint but not in the bulk download. A future iteration could enrich edges
          with "supporting_data_source: infores:<db>" annotations for any databases STRING reports as
          contributing to that pair's evidence (particularly useful for the experiments channel, where
          BioGRID / IntAct are the dominant sources).
      - category: node_content
        consideration: >-
          Ingest "protein.aliases.v12.0.txt.gz" to populate node "name" and "synonym" properties. Currently nodes
          carry only the ENSEMBL ID as their identifier; biolink validation flags this with INFO-level missing
          recommended name warnings on every node.
        relevant_files: 9606.protein.info.v12.0.txt.gz, 9606.protein.aliases.v12.0.txt.gz
    additional_notes: >-
      Current scope: STRING protein–protein functional associations for human, mouse, and rat. Three edge types
      are emitted per qualifying pair: (1) always-present "associated_with + association_basis_qualifier:Functional"
      for all pairs with combined_score > 700, carrying stringdb_combined_score; (2) conditional
      "directly_physically_interacts_with" when the experiments channel exceeds a threshold (TBD, Vlado's
      recommendation pending), carrying stringdb_experimental_score; (3) conditional "coexpressed_with" when
      the coexpression channel exceeds a threshold (TBD), carrying stringdb_coexpression_score.
      Prior predicate model (ORION-aligned per-channel predicates: physically_interacts_with, coexpressed_with,
      interacts_with, gene_fusion_with, genetically_interacts_with, related_to) is superseded; see
      CHANGELOG 2026-07-17. STITCH protein–chemical edges developed alongside this ingest but split out for a
      later effort; preserved on the stitch-ingest branch (see CHANGELOG 2026-05-28).

# Information about the Graph Output by the ingest task
target_info:
    edge_type_info:
      # Decisions from 2026-07-10 and 2026-07-17 Biolink/STRING calls. See CHANGELOG 2026-07-17.
      #
      # New model: 3 edge types.
      #   1. associated_with + association_basis_qualifier:Functional (always, combined_score > 700)
      #   2. directly_physically_interacts_with (conditional on experiments channel threshold, TBD)
      #   3. coexpressed_with (conditional on coexpression channel threshold, TBD)
      #
      # PENDING BLOCKERS (implementation gated on external PRs + analysis):
      #   A. biolink PR (Matt): association_basis_qualifier enum {Statistical, Genetic, Functional}
      #   B. attributes.yaml PR (Matt / Sierra): stringdb_combined_score, stringdb_experimental_score,
      #      stringdb_coexpression_score edge properties
      #   C. Vlado: recommend experiments + coexpression channel cutoffs
      #
      # Prior ORION-aligned per-channel predicate model (5 edge types, combined_score > 500) superseded.

      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:associated_with
        object_categories:
          - biolink:Protein
        # PENDING BLOCKER A: association_basis_qualifier enum (Matt's biolink PR).
        # Intended qualifier: association_basis_qualifier = Functional
        qualifiers:
          - property: association_basis_qualifier
            value: Functional
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        # PENDING BLOCKER B: stringdb_combined_score edge property (attributes.yaml PR).
        edge_properties:
          - stringdb_combined_score
        knowledge_level: [knowledge_assertion]   # tentative; exact value TBD
        agent_type: [data_analysis_pipeline]     # 7-17-26 call: "automated agent"; exact biolink enum TBD
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Emitted for every protein pair whose STRING combined_score exceeds 700 (high-confidence cutoff).
          The association_basis_qualifier:Functional qualifier encodes STRING's core claim: these proteins
          contribute to some shared biological program — a process, pathway, reaction, complex, or expression
          program — without asserting a specific mechanistic relationship. The stringdb_combined_score edge
          property captures the calibrated aggregate evidence score. This edge replaces the prior
          "physically_interacts_with fallback" pattern, which overclaimed physical binding for rows whose
          dominant evidence was textmining or co-occurrence.
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:directly_physically_interacts_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        # PENDING BLOCKER B: stringdb_experimental_score edge property (attributes.yaml PR).
        # PENDING BLOCKER C: threshold value (Vlado's recommendation).
        edge_properties:
          - stringdb_experimental_score
        knowledge_level: [knowledge_assertion]   # per 7-17-26 call
        agent_type: [data_analysis_pipeline]     # 7-17-26 call: "automated agent"; exact biolink enum TBD
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Emitted in addition to the associated_with edge when STRING's experiments channel score exceeds
          the experimental evidence threshold (cutoff TBD: Vlado's recommendation pending). The experiments
          channel aggregates wet-lab assays — yeast two-hybrid, co-immunoprecipitation, AP-MS, protein
          complementation — curated from BioGRID, IntAct, MINT, and DIP. A high experiments score indicates
          direct physical binding between the two proteins has been demonstrated experimentally.
          The stringdb_experimental_score captures the calibrated STRING experiments channel score for this pair.
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

      - subject_categories:
          - biolink:Protein
        predicates:
          - biolink:coexpressed_with
        object_categories:
          - biolink:Protein
        qualifiers:
          - property: species_context_qualifier
            value_enumeration:
              - NCBITaxon:9606
              - NCBITaxon:10090
              - NCBITaxon:10116
        # PENDING BLOCKER B: stringdb_coexpression_score edge property (attributes.yaml PR).
        # PENDING BLOCKER C: threshold value (Vlado's recommendation).
        edge_properties:
          - stringdb_coexpression_score
        knowledge_level: [statistical_association]  # per 7-17-26 call
        agent_type: [data_analysis_pipeline]         # per 7-17-26 call
        primary_knowledge_sources: [infores:string]
        ui_explanation: >-
          Emitted in addition to the associated_with edge when STRING's coexpression channel score exceeds
          the coexpression threshold (cutoff TBD: Vlado's recommendation pending). The coexpression channel
          is derived from correlation analyses of large transcriptomic datasets (microarray and RNA-seq),
          calibrated by STRING against curated pathway co-membership. A high coexpression score indicates
          the two proteins' coding genes show consistently correlated expression across biological conditions.
          The stringdb_coexpression_score captures the calibrated STRING coexpression channel score for this pair.
        source_files:
          - 9606.protein.links.full.v12.0.txt.gz
          - 10090.protein.links.full.v12.0.txt.gz
          - 10116.protein.links.full.v12.0.txt.gz

    node_type_info:
      - node_category: biolink:Protein
        # Source identifier types reflect the canonical post-normalization identifier
        # set on Protein nodes in the merged Translator graph (as seen on Automat's
        # STRING-DB KP). The ingest itself emits "ENSEMBL" as the node id and
        # populates "equivalent_identifiers" with "NCBIGene" CURIEs from the
        # entrez_2_string mapping file. UniProtKB and PR equivalents are filled in
        # downstream by the Translator NodeNormalizer (~98.5% of human ENSPs resolve;
        # the remainder are retired ENSEMBL IDs that STRING v12.0 still ships).
        source_identifier_types:
          - ENSEMBL
          - UniProtKB
          - PR
        node_properties:
          - in_taxon
          - equivalent_identifiers
        additional_notes: >-
          Protein nodes use STRING's native identifiers — ENSEMBL protein IDs that vary by species: ENSP (human),
          ENSMUSP (mouse), ENSRNOP (rat). The leading "{NCBI Taxon ID}." prefix is stripped and the result is prefixed
          with "ENSEMBL:". Each node carries "in_taxon" derived from the row's taxon prefix, and (when a
          STRING to Entrez mapping exists) "equivalent_identifiers" listing one or more "NCBIGene:" CURIEs.
          This explicit equivalence is the hybrid design choice that aligns with both Monarch's gene-endpoint
          ingest pattern (Kevin Schaper, 2026-05) and the Translator NodeNormalizer's expectations, without
          forcing a gene-centric reshape of the graph. NodeNormalizer resolution verified at 98.5% (human),
          100% (mouse), 98% (rat) on sample probes.

