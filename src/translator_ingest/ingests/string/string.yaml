name: string

metadata:
  ingest_title: 'STRING'
  ingest_url: 'https://string-db.org/'
  description: >-
    Search Tool for the Retrieval of Interacting Genes/Proteins (STRING) and its sister database for protein-chemical
    interactions, STITCH. Both share STRING's protein identifier scheme and combined_score model.
  rights: 'https://string-db.org/cgi/access'

readers:
  # STRING protein–protein interactions. Each tag's transform function lives in
  # string.py and is decorated with the matching @koza.transform_record(tag=...)
  # so Koza routes rows to the right transform.
  string_ppi:
    format: "csv"
    delimiter: " "
    header_mode: 0
    # One file per Translator-target taxon. Koza concatenates them under this
    # tag; the transform identifies the taxon per-row from the STRING ID prefix.
    # Uses the ``.full.`` variant (16 columns) so per-channel subscores drive
    # per-channel predicate emission. See string.py CHANNEL_PREDICATES.
    files:
      - '9606.protein.links.full.v12.0.txt.gz'
      - '10090.protein.links.full.v12.0.txt.gz'
      - '10116.protein.links.full.v12.0.txt.gz'
    columns:
      - protein1
      - protein2
      - neighborhood
      - neighborhood_transferred
      - fusion
      - cooccurence
      - homology
      - coexpression
      - coexpression_transferred
      - experiments
      - experiments_transferred
      - database
      - database_transferred
      - textmining
      - textmining_transferred
      - combined_score

  # STITCH protein–chemical interactions. Tab-separated; rows look like
  # ``CIDm91758680\t9606.ENSP00000257254\t279``.
  stitch_pcl:
    format: "csv"
    delimiter: "\t"
    header_mode: 0
    files:
      - '9606.protein_chemical.links.v5.0.tsv.gz'
      - '10090.protein_chemical.links.v5.0.tsv.gz'
      - '10116.protein_chemical.links.v5.0.tsv.gz'
    columns:
      - chemical
      - protein
      - combined_score
