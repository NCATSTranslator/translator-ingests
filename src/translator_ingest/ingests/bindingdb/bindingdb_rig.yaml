name: BindingDb
source_info:
  infores_id: infores:bindingdb
  name: BindingDb
  description: The Binding Database ("BindingDb") is a public, web-accessible database
    of measured binding affinities, focusing chiefly on the interactions of protein
    considered to be drug-targets with small, drug-like molecules. As of July 31,
    2021, BindingDB contains thousands of dataset Entries, each with a DOI,
    containing millions of binding assay results for thousands of protein targets
    assayed against over a million distinct small molecule ligands. 
  citations:
    - https://doi.org/10.1093/nar/gkae1075
  terms_of_use_info:
    terms_of_use_description: >-
      All data and download files in bindingDB are freely
      available under a 'Creative Commons BY 3.0' license.
  data_access_locations:
    - BindingDb bulk downloads - https://www.bindingdb.org/rwd/bind/downloads/
  data_provision_mechanisms:
    - file_download
  data_formats:
    - tsv
  data_versioning_and_releases: >-
    Regular releases at the start of each month date stamped with the
    year and month of the release (i.e. 202511), incorporated into the data file name.
ingest_info:
  ingest_categories:
  - null
  utility: null
  scope: null
  relevant_files:
  - file_name: BindingDB_All_{version}_tsv.zip
    location: https://www.bindingdb.org/rwd/bind/downloads/
    description: All data in BindingdDB
  included_content:
  - file_name: BindingDB_All_{version}_tsv.zip
    included_records: Homo sapien-related entries only
    fields_used:
      - BindingDB Reactant_set_id
      - BindingDB MonomerID
      - PubChem CID
      - Target Name
      - Target Source Organism According to Curator or DataSource
      - UniProt (SwissProt) Primary ID of Target Chain 1
      - Curation/DataSource
      - Article DOI
      - PMID
      - Patent Number
      - Ki (nM)
      - IC50 (nM)
      - Kd (nM)
      - EC50 (nM)
  filtered_content:
    - file_name:  BindingDB_All_{version}_tsv.zip
      filtered_records: >-
        The records are currently filtered out based upon:
        'Ki','IC50','Kd' and 'EC50' having values below 1 micromolar.
      rationale:  >-
        The units of these kinetic parameters are nM. 
        Lower values imply stronger binding affinity
        or functional effects. Imposing a threshold
        focuses on the most relevant interactions.
        For Ki, IC50, EC50, the value relates to
        the concentration of ligand (or drug) 
        needed to inhibit 50% of enzyme activity.
  future_considerations:
  - category: edge_content
    consideration: >-
      Kon and Koff rates are, respectively, the rate
      which a ligand binds and dissociates from a protein.
      The ratio of Koff/Kon is Kd, the binding affinity
      between a ligand and its target.
    relevant_files:
    - BindingDB_All_{version}_tsv.zip
  additional_notes: null
target_info:
  infores_id: infores:translator-bindingdb-kgx
  edge_type_info:
  - subject:
    - biolink:ChemicalEntity
    predicates:
    - biolink:directly_physically_interacts_with
    object:
    - biolink:Protein
    knowledge_level: knowledge_assertion
    agent_type: manual_agent
    primary_knowledge_sources:
      - infores:bindingdb
    supporting_data_sources:
      - infores:chembl
      - infores:ki-database
      - infores:taylor-research-group-ucsd
      - infores:uspto-patent
    edge_properties:
    - biolink:publications
    - biolink:has_affinity
    ui_explanation: TO DO
    source_files:
      - BindingDB_All_{version}_tsv.zip
    additional_notes: >-
      BindingDB provides generates chemical-protein interaction statements based on
      manual curation from the literature, or import from external knowledgebases.
      Records include details about experiment supporting each interaction,
      including binding/affinity metrics. The source tsv may therefore include >1 row
      for a given chemical-protein interaction.  Translator's ingest collapses records
      with the same chemical ligand (Pubchem CID) and protein target (Uniprot id)
      into a single edge, and aggregates metadata across contributing records
      (e.g. a list of all supporting publications, all supporting data sources
      across contributing BindingDB records).  Vlado indicated that BindingDB does
      some QA/filtering of binding assay records it imports to ensure that it only
      includes those with affinity metrics suggesting a bona fide physical interaction
      is occurring - which is why we use the biolink:physically_interacts_with predicate.
  node_type_info:
  - node_category: biolink:ChemicalEntity
    source_identifier_types:
    - PUBCHEM.COMPOUND
  - node_category: biolink:Protein
    source_identifier_types:
    - UniProtKB
  future_considerations:
  - category: null
    consideration: null
  additional_notes: null
