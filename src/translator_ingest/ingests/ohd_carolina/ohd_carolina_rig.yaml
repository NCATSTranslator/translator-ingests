ingest_info:
  ingest_categories:
  - aggregation_interpreter
  utility: >-
    Real clinical data from patients diagnosed with a condition, exposed to a drug, or who had a procedure.
  scope: Clinical correlations of patients to treatments.
  relevant_files:
  - file_name: unc_omop_2018_2022_kg.zip
    location: https://stars.renci.org/var/data_services/ohd
    description: Zip compressed csv file of OHD Carolina clinical data.
  included_content:
  - file_name: unc_omop_2018_2022_kg.csv
    included_records: all
    fields_used: "subject,subject_name,object,object_name,predicate,chi_squared_p_value,log_odds_ratio,log_odds_ratio_95_ci,score,total_sample_size,primary_knowledge_source"

