name: SemMedDB Resource Ingest Guide (RIG)

source_info:
  infores_id: infores:semmeddb
  name: Semantic MEDLINE Database (SemMedDB)
  description: >-
    SemMedDB is a repository of semantic predications (subject-predicate-object triples)
    extracted by the SemRep natural-language-processing system from titles and abstracts in
    PubMed/MEDLINE. Produced by the U.S. National Library of Medicine, it captures assertions
    about biomedical entities (drugs, diseases, genes, anatomy, procedures, phenotypes, etc.)
    together with the sentences and PMIDs that support them, and is widely used for
    literature-based hypothesis generation. This RIG documents an ingest of a post-processed
    SemMedDB edge slice redistributed by the RTX-KG2 project, not a raw ingest of the NLM
    SemMedDB MySQL distribution. RTX-KG2 has already projected SemMedDB predications into
    Biolink-shaped edges (Biolink predicate, publications, publications_info, kg2_ids, optional
    qualifiers, domain_range_exclusion flag); this pipeline transforms that slice with Koza.
  citations:
    - "Kilicoglu H, Shin D, Fiszman M, Rosemblat G, Rindflesch TC. SemMedDB: a PubMed-scale repository of semantic predications. Bioinformatics. 2012 Dec 1;28(23):3158-60. PMID: 23044550"
  terms_of_use_info:
    terms_of_use_url: "https://lhncbc.nlm.nih.gov/temp/SemRep_SemMedDB_SKR/dbinfo.html"
    terms_of_use_description: >-
      SemMedDB is distributed by the U.S. National Library of Medicine as part of the Semantic
      Knowledge Representation (SKR) resources and its use is subject to acceptance of the UMLS
      Metathesaurus License Agreement (SemMedDB is derived from UMLS Metathesaurus concepts).
      This ingest does not consume the NLM distribution directly; it consumes a derived SemMedDB
      edge slice that RTX-KG2 redistributes from its public 'rtx-kg2-public' S3 bucket. TODO
      (owner): confirm the terms under which the RTX-KG2-redistributed slice may be re-used, and
      whether the UMLS license still governs downstream Translator use.
    license_name: "UMLS Metathesaurus License Agreement"
  data_access_locations:
    - >-
      SemMedDB (original NLM source behind SemRep; not the file this ingest reads directly):
      https://lhncbc.nlm.nih.gov/temp/SemRep_SemMedDB_SKR/SemMedDB_download.html
    - >-
      RTX-KG2 public SemMedDB edges slice (gzipped JSONL - this is what this ingest downloads):
      https://rtx-kg2-public.s3.us-west-2.amazonaws.com/kg2.10.3-semmeddb-edges.jsonl.gz
  data_provision_mechanisms:
    - file_download
  data_formats:
    - json  # source slice is JSON Lines (.jsonl); 'json' is the closest DataFormatEnum value
  data_versioning_and_releases: >-
    NLM historically released SemMedDB periodically (versioned as VER<NN>, e.g. VER43). This
    ingest is pinned to the SemMedDB content captured in the RTX-KG2 kg2.10.3 snapshot
    (SemMedDB VER43-era releases); the effective version reported by the ingest is
    'semmeddb-2023-kg2.10.3'. Version cadence is therefore governed by RTX-KG2 snapshot builds
    rather than by direct SemMedDB releases.
  source_status: maintained_as_needed_updates
  additional_notes:
    - >-
      TODO (owner): confirm source_status. SemMedDB has historically been updated by NLM on an
      as-needed / periodic basis rather than a fixed recurring schedule; 'maintained_as_needed_updates'
      is used pending confirmation of the current maintenance cadence of both SemMedDB and the
      RTX-KG2 slice.

ingest_info:
  ingest_categories:
    - primary_knowledge_provider
  utility: >-
    Large-scale, literature-derived relationships spanning many biomedical entity types, suitable
    for hypothesis generation, cross-graph enrichment, and pathfinder-style reasoning where
    evidence-bearing (publication-supported) edges are valuable even when individually noisy.
  scope: >-
    Edges taken from RTX-KG2's SemMedDB slice, restricted to a selected set of 20 Biolink
    predicates and to evidence-bearing records (more than 3 supporting publications), with
    additional filtering to remove low-value predicates, domain/range-incoherent edges, and
    upstream-dropped predicates. Nodes are emitted only for the subject/object endpoints of
    included edges.

  relevant_files:
    - file_name: "kg2.10.3-semmeddb-edges.jsonl (RTX-KG2 SemMedDB slice)"
      location: "https://rtx-kg2-public.s3.us-west-2.amazonaws.com/kg2.10.3-semmeddb-edges.jsonl.gz"
      description: >-
        KGX-compatible edges with Biolink predicates, literature evidence (publications,
        publications_info), kg2_ids, optional qualifiers, and a domain_range_exclusion flag.
        Downloaded via semmeddb/download.yaml; the decompressed JSONL is the Koza reader input.
        This is the only file downloaded by this ingest.

  included_content:
    - file_name: "kg2.10.3-semmeddb-edges.jsonl"
      # AB: expanded from 10 to 20 Biolink predicates to align with BTE's predicate coverage.
      # The 10 new predicates (has_part, occurs_in, produces, has_input, diagnoses, precedes,
      # derives_from, exacerbates_condition, manifestation_of, close_match) were previously
      # filtered out but are kept by BTE and have legitimate biomedical value.
      included_records: >-
        Edges whose Biolink predicate is in the selected set of 20 predicates:
        biolink:affects, biolink:causes, biolink:close_match, biolink:coexists_with,
        biolink:derives_from, biolink:diagnoses, biolink:disrupts, biolink:exacerbates_condition,
        biolink:has_input, biolink:has_part, biolink:interacts_with, biolink:located_in,
        biolink:manifestation_of, biolink:occurs_in, biolink:precedes,
        biolink:predisposes_to_condition, biolink:preventative_for_condition,
        biolink:produces, biolink:related_to, biolink:treats_or_applied_or_studied_to_treat.
        These are mapped by KG2 from original SEMMEDDB predicates:
        ADMINISTERED_TO, AFFECTS, ASSOCIATED_WITH, AUGMENTS, CAUSES, COEXISTS_WITH,
        COMPLICATES, CONVERTS_TO, DIAGNOSES, DISRUPTS, INHIBITS, INTERACTS_WITH,
        LOCATION_OF (inverted), MANIFESTATION_OF, OCCURS_IN, PART_OF (inverted),
        PRECEDES, PREDISPOSES, PREVENTS, PROCESS_OF, PRODUCES, SAME_AS,
        STIMULATES, TREATS, USES, XREF.
        During transform, biolink:preventative_for_condition is remapped to
        biolink:treats_or_applied_or_studied_to_treat, leaving 19 distinct output predicates.
      # AB: fields_used reflects actual fields consumed after refactor.
      # Removed negated, subject_novelty, object_novelty (not present in KG2 data; dead code removed).
      # Added qualified_predicate, qualified_object_aspect, qualified_object_direction (qualifier pass-through).
      # Added kg2_ids (used to filter BTE-excluded original predicates).
      fields_used: >-
        subject, predicate, object, publications, publications_info,
        domain_range_exclusion, kg2_ids,
        qualified_predicate, qualified_object_aspect, qualified_object_direction

  filtered_content:
    # AB: BTE-excluded original predicates are now filtered via kg2_ids parsing.
    # KG2 maps compared_with, isa, measures, higher_than, lower_than all to biolink:related_to,
    # making them indistinguishable at the Biolink predicate level. We parse the kg2_ids field
    # (format: SUBJECT---SEMMEDDB:predicate---OBJECT) to recover the original predicate and
    # drop records BTE considers low-value. This removes ~1.1M noisy related_to records.
    - file_name: "kg2.10.3-semmeddb-edges.jsonl"
      filtered_records: >-
        Edges whose original SemMedDB predicate (extracted from kg2_ids) is in the
        BTE-excluded set: COMPARED_WITH, ISA, MEASURES, HIGHER_THAN, LOWER_THAN.
        All five map to biolink:related_to in KG2 but are removed because BTE
        considers them non-informative for knowledge graph use.
      rationale: "Align with BTE filtering of low-value predicates hidden inside biolink:related_to."
    - file_name: "kg2.10.3-semmeddb-edges.jsonl"
      filtered_records: "Predicates dropped by the original RTX-KG2 ingest: SEMMEDDB:MEASUREMENT_OF, SEMMEDDB:METHOD_OF, SEMMEDDB:NOM, SEMMEDDB:PREP, SEMMEDDB:VERB."
      rationale: "These predicates are removed upstream by KG2 before we receive the data."
    - file_name: "kg2.10.3-semmeddb-edges.jsonl"
      filtered_records: "Edges with 3 or fewer supporting publications."
      rationale: "Ensure each edge has meaningful literature support; singleton text-mining extractions are noisy."
    - file_name: "kg2.10.3-semmeddb-edges.jsonl"
      filtered_records: "Edges where the KG2 domain_range_exclusion flag is True."
      rationale: "Remove semantically incoherent subject/object type combinations flagged by KG2."
    - file_name: "kg2.10.3-semmeddb-edges.jsonl"
      filtered_records: >-
        Qualifier triples (not whole edges) are stripped when an activity-like aspect
        (activity, activity_or_abundance, abundance) is applied to an edge whose subject or
        object is not a Gene, Protein, or ChemicalEntity. The edge is still emitted as a plain
        biolink:affects Association with its literature evidence preserved; only the qualifier
        is dropped.
      rationale: >-
        Per NCATSTranslator/Feedback#1213, KG2 emits chemical -> phenotype/disease/anatomy edges
        qualified as 'causes activity_or_abundance increased', which downstream reasoners chain on
        to produce nonsensical 'X has increased activity caused by Y' inferences.
    # AB: Publication cap ported from semmeddb_pmid_cap branch (#342).
    # Some SemMedDB edges have 60k+ PMIDs, producing massive output rows.
    - file_name: "kg2.10.3-semmeddb-edges.jsonl"
      filtered_records: >-
        For edges with more than 200 publications, the publication list is trimmed
        to the union of top-100 by confidence score (min of subject/object score) and
        top-100 by recency (publication year), yielding at most ~200 PMIDs per edge.
        This only affects rare extreme cases (some edges have 60k+ PMIDs) and is disabled
        when the SEMMEDDB_UNCAPPED=1 environment variable is set.
      rationale: "Prevent oversized edges while retaining the most informative publications by two orthogonal strategies. Configurable for uncapped builds."

  future_considerations:
    - category: edge_property_content
      consideration: >-
        Expand SemMedDB evidence payloads (supporting snippets, evidence/publication counts, and
        per-publication confidence scores) as richer edge properties after validating downstream
        UI and KG constraints.
      relevant_files: "kg2.10.3-semmeddb-edges.jsonl"
    - category: other
      consideration: >-
        Evaluate re-ingesting from raw SemMedDB (rather than the KG2-derived slice) to recover
        fields stripped by KG2 - negated statements, subject/object novelty, subject/object
        semantic types, and node names. This would enable negation filtering, novelty thresholds,
        BTE-parity per-metatriple publication-count thresholds (which require semantic types),
        and node labeling.
      relevant_files: "kg2.10.3-semmeddb-edges.jsonl"

  additional_notes:
    # Known issues / expected behaviors (Manual QA fixes) - captured here because the schema has
    # no dedicated 'known_issues' slot.
    - >-
      Domain/range constraint violations are expected. SemMedDB is a text-mining source, so
      extracted subject/object types do not always fit Biolink's strict domain/range rules
      (e.g. 'surgery treats diabetes'). Roughly 10,000+ Biolink validation warnings result,
      chiefly on biolink:treats_or_applied_or_studied_to_treat and biolink:predisposes_to_condition
      where subjects such as Procedure, Protein, Gene, Device, Disease, or InformationContentEntity
      and objects such as Cohort, Cell, or PopulationOfIndividualOrganisms appear. These edges are
      retained because they carry real literature evidence; the warnings are expected, not bugs.
    - >-
      The KGX summary report may list an 'original_json' edge property that is absent from the
      final normalized output. This is normal KGX behavior - the property exists in intermediate
      processing but is stripped during normalization.
    - >-
      Qualifier object_aspect_qualifier values diverge from BTE for stimulates/inhibits: KG2 uses
      'activity' while BTE uses 'activity_or_abundance' (only 'augments' matches). Per the DINGO
      call decision (2026-03-31), KG2 qualifier values are passed through as-is rather than remapped.
    - >-
      KG2 pre-processing strips several SemMedDB fields we cannot recover (negated, subject_novelty,
      object_novelty, subject_semtype, object_semtype, subject_name, object_name). This prevents
      negation filtering, novelty thresholds, and BTE's per-metatriple publication-count thresholds.
      Resolving this would require a re-ingest from raw SemMedDB data (see future considerations).

target_info:
  edge_type_info:
    # NOTE: All 19 output predicates are documented together in a single EdgeType because the
    # transform assigns subject/object categories by CURIE prefix (PREFIX_TO_CLASS), independent
    # of predicate - so the same broad set of subject/object categories applies to every predicate,
    # and no single primary knowledge source / knowledge level / agent type distinction separates
    # them. See target_info.future_considerations: splitting into per-predicate (or predicate-family)
    # EdgeTypes with tighter category pairings is a known refinement. The schema's guidance that a
    # multivalued 'predicates' list should be limited to a predicate and its descendants is
    # intentionally not yet satisfied here; this is flagged for owner review.
    - subject_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:ChemicalEntity
        - biolink:Disease
        - biolink:PhenotypicFeature
        - biolink:AnatomicalEntity
        - biolink:NamedThing
      predicates:
        - biolink:affects
        - biolink:causes
        - biolink:close_match
        - biolink:coexists_with
        - biolink:derives_from
        - biolink:diagnoses
        - biolink:disrupts
        - biolink:exacerbates_condition
        - biolink:has_input
        - biolink:has_part
        - biolink:interacts_with
        - biolink:located_in
        - biolink:manifestation_of
        - biolink:occurs_in
        - biolink:precedes
        - biolink:predisposes_to_condition
        - biolink:produces
        - biolink:related_to
        - biolink:treats_or_applied_or_studied_to_treat
      object_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:ChemicalEntity
        - biolink:Disease
        - biolink:PhenotypicFeature
        - biolink:AnatomicalEntity
        - biolink:NamedThing
      qualifiers:
        # Qualifiers are passed through from KG2 and appear on biolink:affects edges derived
        # from stimulates/inhibits/augments; subject_form_or_variant_qualifier is set for
        # gene->disease / gene->phenotype causal edges.
        - property: biolink:qualified_predicate
          value_description: "Pass-through from KG2 (e.g. biolink:causes). Set only when the KG2 record carries a qualified_predicate."
        - property: biolink:object_aspect_qualifier
          value_range:
            - biolink:GeneOrGeneProductOrChemicalEntityAspectEnum
          value_description: >-
            Pass-through from KG2 (e.g. activity, activity_or_abundance, abundance). Activity-like
            aspects are stripped when either endpoint is not a Gene, Protein, or ChemicalEntity
            (see NCATSTranslator/Feedback#1213).
        - property: biolink:object_direction_qualifier
          value_range:
            - biolink:DirectionQualifierEnum
          value_description: "Pass-through from KG2 (e.g. increased, decreased)."
        - property: biolink:subject_form_or_variant_qualifier
          value_enumeration:
            - genetic_variant_form
          value_description: >-
            Set to 'genetic_variant_form' for biolink:causes edges routed to
            CausalGeneToDiseaseAssociation or GeneToPhenotypicFeatureAssociation.
      knowledge_level:
        - not_provided
      agent_type:
        - text_mining_agent
      primary_knowledge_sources:
        - infores:semmeddb
      edge_properties:
        - biolink:publications
        - biolink:sources
        - biolink:has_supporting_studies
        - biolink:subject_form_or_variant_qualifier
        - biolink:qualified_predicate
        - biolink:object_aspect_qualifier
        - biolink:object_direction_qualifier
      ui_explanation: >-
        SemMedDB records are generated by an automated text-mining agent (SemRep) that extracts
        subject-predicate-object assertions from biomedical literature. This edge represents text
        evidence that [SUBJECT] and [OBJECT] were reported with the [RELATIONSHIP] relationship in
        the source literature, supported by the cited publications. Because the assertion is derived
        by automated NLP rather than curated or experimentally validated, its knowledge level is
        'not provided' and its agent type is 'text mining agent'.
      source_files:
        - "kg2.10.3-semmeddb-edges.jsonl (RTX-KG2 SemMedDB slice)"
      additional_notes:
        - >-
          Records carrying qualifiers are routed at transform time to specific Biolink Association
          subclasses based on subject/object entity types, so that structured qualifier fields
          survive pydantic model_dump() serialization: ChemicalAffectsGeneAssociation,
          GeneAffectsChemicalAssociation, GeneToGeneAssociation, or (fallback)
          ChemicalAffectsBiologicalEntityAssociation for qualified biolink:affects edges;
          CausalGeneToDiseaseAssociation or GeneToPhenotypicFeatureAssociation for gene->disease /
          gene->phenotype biolink:causes edges; and a generic biolink:Association otherwise.
        - >-
          Supporting text snippets are retained in has_supporting_studies -> has_study_results ->
          supporting_text (as TextMiningStudyResult objects); there is no top-level supporting_text
          edge property.
        - >-
          Qualifier fields (qualified_predicate, object_aspect_qualifier, object_direction_qualifier)
          appear only on biolink:affects edges derived from the original SemMedDB stimulates,
          inhibits, or augments predicates.
        - >-
          Subject/object categories are assigned by the transform from the CURIE prefix
          (PREFIX_TO_CLASS); any endpoint whose prefix is not recognized is emitted as
          biolink:NamedThing. Final categories may differ after downstream node normalization.

  # Node types emitted by this ingest, as assigned by the transform (PREFIX_TO_CLASS).
  # Downstream node normalization commonly reassigns these to more specific categories
  # (e.g. SmallMolecule, Drug, MolecularMixture, Cell, OrganismTaxon, Procedure, Behavior,
  # PopulationOfIndividualOrganisms, and many others) - see additional_notes on biolink:NamedThing.
  node_type_info:
    - node_category: biolink:Gene
      source_identifier_types:
        - NCBIGene
        - HGNC
        - ENSEMBL
    - node_category: biolink:Protein
      source_identifier_types:
        - PR
        - UniProtKB
    - node_category: biolink:ChemicalEntity
      source_identifier_types:
        - CHEBI
        - DRUGBANK
    - node_category: biolink:Disease
      source_identifier_types:
        - MONDO
        - DOID
    - node_category: biolink:PhenotypicFeature
      source_identifier_types:
        - HP
    - node_category: biolink:AnatomicalEntity
      source_identifier_types:
        - UBERON
    - node_category: biolink:NamedThing
      source_identifier_types:
        - "Any CURIE prefix not in the recognized set (NCBIGene, HGNC, ENSEMBL, PR, UniProtKB, CHEBI, DRUGBANK, MONDO, DOID, HP, UBERON) is emitted with a fallback category of biolink:NamedThing."
      additional_notes:
        - >-
          This is a fallback category for endpoints whose identifier prefix the transform does not
          map to a specific Biolink class. Downstream normalization typically reassigns these nodes
          to more specific categories (the broader set previously enumerated in this RIG - e.g.
          SmallMolecule, Drug, MolecularMixture, Cell, OrganismTaxon, Procedure, Behavior,
          PopulationOfIndividualOrganisms, InformationContentEntity, etc. - reflects post-normalization
          categories rather than what this ingest assigns).

  future_considerations:
    - category: predicates
      consideration: >-
        Split the single broad EdgeType into per-predicate (or predicate-family) EdgeTypes with
        tighter, predicate-specific subject/object category pairings, per the schema's guidance that
        a multivalued 'predicates' list should be limited to a predicate and its descendants. This
        requires determining category pairings per predicate, which the current prefix-based node
        typing does not provide.
    - category: qualifiers
      consideration: >-
        KG2 object_aspect_qualifier values are passed through as-is and diverge from BTE
        (activity vs activity_or_abundance for stimulates/inhibits). Revisit if a canonical
        cross-source qualifier mapping is adopted.
    - category: node_properties
      consideration: >-
        Node names/labels are stripped upstream by KG2, so emitted nodes carry identifiers but no
        source-provided names. Revisit if a raw SemMedDB re-ingest is adopted (see ingest_info
        future considerations).
    - category: other
      consideration: >-
        The SemMedDB edge slice is obtained via RTX-KG2 redistribution, but the transform records
        only infores:semmeddb as the primary knowledge source. Consider whether RTX-KG2 (infores:rtx-kg2)
        should be recorded as an aggregator knowledge source to reflect the actual retrieval path.

