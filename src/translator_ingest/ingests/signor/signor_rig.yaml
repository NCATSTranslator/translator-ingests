## Information about the Graph Output by the ingest
## SIGNOR causal mechanism mapping (see mappings here: https://docs.google.com/spreadsheets/d/1DeAE04O1mz3R9s3dCZpG2hQp9hwif5WjdkUMsBci-u8/edit?gid=0#gid=0&range=D16))
target_info:
  infores_id: infores:translator-signor
  edge_type_info:
    - subject_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:SmallMolecule             ## Qi - review comment: there are small molecule as subject node in the graph-metadata.json output
      predicates:
        - biolink:regulates
      object_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:SmallMolecule
      qualifiers:
        - property: biolink:qualified_predicate
          value_enumerations:
              - biolink:causes
        - property: biolink:object_aspect_qualifier
          value_enumerations:
              - activity_or_abundance
              - activity
              - abundance
              - expression
              - stability
        - property: biolink:object_direction_qualifier
          value_enumerations:
            - downregulated
            - upregulated
        - property: biolink:causal_mechanism_qualifier
          value_range: CausalMechanismQualifierEnum
        - property: biolink:anatomical_context_qualifier
          value_description: UBERON or Cell Ontology terms, to represent data in the SIGNOR CELL_DATA and TISSUE_DATA columns,
        - property: biolink:species_context_qualifier
          value_description: NCBITaxon term to represent data in the SIGNOR TAX_ID column.
      knowledge_level:
        - knowledge_assertion
      agent_type:
        - manual_agent
      edge_properties:
        - biolink:publications
        - biolink:has_confidence_score
        - biolink:supporting_text
      ui_explanation: "Signor records indicate the protein / protein family to 'regulate' another protein / complex / protein family / small molecule or complex / small molecule to 'regulate' another complex / protein / protein family / small molecule - which maps best to the Biolink predicate 'regulates' with additional directional qualifier."

    - subject_categories:
        - biolink:ChemicalEntity
        - biolink:Drug
      predicates:
        - biolink:affects
      object_categories:
        - biolink:Gene
        - biolink:Protein
        - biolink:SmallMolecule
        - biolink:ChemicalEntity
        - biolink:Drug        
      qualifiers:
        - property: biolink:qualified_predicate
          value_enumerations:
              - biolink:causes
        - property: biolink:object_aspect_qualifier
          value_enumerations:
            - activity_or_abundance
            - activity
            - abundance
            - expression
            - stability
        - property: biolink:object_direction_qualifier
          value_enumerations:
            - increased
            - decreased
        - property: biolink:causal_mechanism_qualifier
          value_range: CausalMechanismQualifierEnum
        - property: biolink:anatomical_context_qualifier
          value_description: UBERON or Cell Ontology terms, to represent data in the SIGNOR CELL_DATA and TISSUE_DATA columns.
        - property: biolink:species_context_qualifier
          value_description: NCBITaxon term to represent data in the SIGNOR TAX_ID column.
      knowledge_level:
        - knowledge_assertion
      agent_type:
        - manual_agent
      edge_properties:
        - publications
        - has_confidence_score
        - supporting_text
      ui_explanation: "Signor records indicate the chemical or drug to 'affect' a protein / small molecule / other chemical or drug - which maps best to the Biolink predicate 'affects' with additional aspect and direction qualifiers."
      
    - subject_categories:
        - biolink:Protein
        - biolink:Gene     
        - biolink:Drug        
        - biolink:SmallMolecule
        - biolink:ChemicalEntity        
      predicates:
        - biolink:affects
      object_categories:
        - biolink:ChemicalEntity
        - biolink:Drug        
      qualifiers:
        - property: biolink:qualified_predicate
          value_enumerations:
            - biolink:causes
        - property: biolink:object_aspect_qualifier
          value_enumerations:
            - activity_or_abundance
            - activity
            - abundance
            - stability
        - property: biolink:object_direction_qualifier
          value_enumerations:
            - increased
            - decreased
        - property: biolink:causal_mechanism_qualifier
          value_range: CausalMechanismQualifierEnum
        - property: biolink:anatomical_context_qualifier
          value_description: UBERON or Cell Ontology terms, to represent data in the SIGNOR CELL_DATA and TISSUE_DATA columns.
        - property: biolink:species_context_qualifier
          value_description: NCBITaxon term to represent data in the SIGNOR TAX_ID column.
      knowledge_level:
        - knowledge_assertion
      agent_type:
        - manual_agent
      edge_properties:
        - biolink:publications
        - biolink:has_confidence_score
        - biolink:supporting_text
      ui_explanation: "Signor records indicate the protein / complex / proteinfamily / small molecule to be 'affects' another chemical - which maps best to the Biolink predicate 'affects' with additional directional qualifier."

    - subject_categories:
        - biolink:ChemicalEntity
        - biolink:Drug
        - biolink:Protein
        - biolink:Gene        
        - biolink:SmallMolecule
      predicates:
        - biolink:directly_physically_interacts_with
      object_categories:
        - biolink:ChemicalEntity
        - biolink:Drug
        - biolink:Protein
        - biolink:Gene        
        - biolink:SmallMolecule
      qualifiers:
        - property: biolink:anatomical_context_qualifier
          value_description: UBERON or Cell Ontology terms, to represent data in the SIGNOR CELL_DATA and TISSUE_DATA columns.
        - property: biolink:species_context_qualifier
          value_description: NCBITaxon term to represent data in the SIGNOR TAX_ID column.
      knowledge_level:
        - knowledge_assertion
      agent_type:
        - manual_agent
      edge_properties:
        - biolink:publications
        - biolink:has_confidence_score
        - biolink:supporting_text
       ## Note to QW: SIGNOR includes a column that explicitly reports whether each causal association is direct or not - use this as a flag to determine for what records to create this additional 'directly_physically_interacts_with' edge, instead of implicit definitions/mappings from MECHANISM terms.
      ui_explanation: "When the value of the "DIRECT" column is 'true' - this implies a direct physical interaction, and the ingestion creates a separate 'physically_interacts_with' edge in addition to the affects/regulates edge (e.g. 'binding') "
      additional_notes: "Note here that we decided to base these on the value of the DIRCT column being "true", rather than basing it on whether the mechanism implied a physical interaction.  However, I do want to revisit the idea of creating a more specific 'biolink:binds' edge only in cases where the mechanism is 'binding'"
  
