  future_considerations:
    - category: node_content
      consideration: "Considering future new biolink node types: stimulus and fusion protein for more accurate mapping into Biolink model"
    - category: edge_content
      consideration: Note that fact that X modifies Y (e.g. phosphorylates) is represented indirectly here, by an 'affects' predicate plus a mechanism qualifier that captures the type of modification.  Do we want a more direct edge (e.g. X phosphorylates Y) to be created at ingest?  Or derived afterward? Or perhaps live only in a 'predicate-semantics' KG derived from the primary 'qualifier-semantics' KG)?

